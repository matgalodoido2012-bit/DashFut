<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Streamer Dashboard Ultra - Final Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1920px; height: 1080px; background: #070707; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #0f8; border-radius: 10px; }

        .match-status-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 30px;
            background: #111; display: flex; align-items: center; justify-content: center;
            font-weight: 900; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #333; z-index: 100;
        }

        .scoreboard { 
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%); 
            background: #151515; padding: 8px 35px; display: flex; gap: 25px; 
            border-radius: 10px; border: 1px solid #333; z-index: 10; 
        }
        .team { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .score { font-size: 45px; color: #0f8; min-width: 110px; text-align: center; font-family: 'Monaco', monospace; }

        /* LISTAS OTIMIZADAS */
        .lists-wrapper { position: absolute; top: 110px; left: 25px; width: 460px; display: flex; gap: 10px; }
        .team-list { width: 225px; }
        .team-header { background: #0f8; color: #000; padding: 8px; border-radius: 6px 6px 0 0; font-weight: 900; font-size: 10px; text-align: center; }
        .players-container { background: rgba(15,15,15,0.9); border: 1px solid #333; padding: 5px; height: 500px; overflow-y: auto; border-radius: 0 0 6px 6px; }
        .player-row { display: flex; align-items: center; gap: 8px; padding: 6px; margin: 2px 0; background: #1a1a1a; border-radius: 4px; font-size: 10px; cursor: pointer; border-left: 2px solid transparent; }
        .player-row:hover { border-left-color: #0f8; background: #222; }

        /* CAMPO */
        .center-area { position: absolute; top: 110px; left: 500px; width: 880px; display: flex; flex-direction: column; align-items: center; }
        .pitch-container { 
            position: relative; width: 500px; height: 680px; background: #0a1a10; border: 2px solid #0f8; border-radius: 8px; 
            overflow: hidden; box-shadow: inset 0 0 50px #000; margin-top: 10px;
        }
        .player-dot { position: absolute; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; transform: translate(-50%, -50%); border: 2px solid #000; transition: 0.2s; z-index: 5; }
        .player-dot.home { background: #0f8; color: #000; }
        .player-dot.away { background: #fff; color: #000; }
        .player-dot.highlight { transform: translate(-50%, -50%) scale(1.8) !important; box-shadow: 0 0 20px #0f8; z-index: 100; }

        /* LADO DIREITO (STATS COMPLETAS) */
        .right-sidebar { position: absolute; top: 110px; right: 30px; width: 480px; display: flex; flex-direction: column; gap: 15px; }
        .stats-pro { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .stat-box { margin-bottom: 10px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 800; color: #888; margin-bottom: 3px; text-transform: uppercase; }
        .stat-bar-outer { height: 6px; background: #222; border-radius: 3px; display: flex; overflow: hidden; }
        .bar-h { background: #0f8; height: 100%; transition: 1s ease; }
        .bar-a { background: #fff; height: 100%; transition: 1s ease; }
        .camera-box { width: 480px; height: 270px; border: 2px solid #333; border-radius: 12px; background: #000; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; }

        /* CONFIGS */
        .settings-btn { position: fixed; top: 5px; right: 10px; background: none; border: none; color: #444; cursor: pointer; z-index: 1001; }
        .config-panel { position: fixed; top: 35px; right: 10px; width: 350px; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 0 20px #000; }
        .config-panel.active { display: block; }
        .config-input { width: 100%; padding: 8px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 8px; border-radius: 4px; }
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="match-status-banner" id="matchStatus">BOLA EM JOGO</div>

    <div class="scoreboard">
        <div class="team"><img id="logoA" src=""> <span id="teamA">MANDANTE</span></div>
        <div class="score"><span id="scA">0</span> - <span id="scB">0</span></div>
        <div class="team"><span id="teamB">VISITANTE</span> <img id="logoB" src=""></div>
    </div>

    <div class="lists-wrapper">
        <div class="team-list">
            <div class="team-header" id="hA">TIME A</div>
            <div class="players-container" id="listA"></div>
        </div>
        <div class="team-list">
            <div class="team-header" id="hB">TIME B</div>
            <div class="players-container" id="listB"></div>
        </div>
    </div>

    <div class="center-area">
        <div id="timerVal" style="font-size: 20px; color: #0f8; font-weight: 900;">--'</div>
        <div class="pitch-container" id="pitch"></div>
    </div>

    <div class="right-sidebar">
        <div class="stats-pro">
            <div class="stat-box"><div class="stat-label"><span id="vPosA">50%</span> POSSE <span id="vPosB">50%</span></div><div class="stat-bar-outer"><div id="bPosA" class="bar-h" style="width: 50%"></div><div id="bPosB" class="bar-a" style="width: 50%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vSOnA">0</span> NO GOL <span id="vSOnB">0</span></div><div class="stat-bar-outer"><div id="bSOnA" class="bar-h" style="width: 0%"></div><div id="bSOnB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vShotA">0</span> CHUTES <span id="vShotB">0</span></div><div class="stat-bar-outer"><div id="bShotA" class="bar-h" style="width: 0%"></div><div id="bShotB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vCornA">0</span> ESCANTEIOS <span id="vCornB">0</span></div><div class="stat-bar-outer"><div id="bCornA" class="bar-h" style="width: 0%"></div><div id="bCornB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vFoulA">0</span> FALTAS <span id="vFoulB">0</span></div><div class="stat-bar-outer"><div id="bFoulA" class="bar-h" style="width: 0%"></div><div id="bFoulB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vCardA">0</span> AMARELOS <span id="vCardB">0</span></div><div class="stat-bar-outer"><div id="bCardA" class="bar-h" style="width: 0%"></div><div id="bCardB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vOffA">0</span> IMPEDIMENTOS <span id="vOffB">0</span></div><div class="stat-bar-outer"><div id="bOffA" class="bar-h" style="width: 0%"></div><div id="bOffB" class="bar-a" style="width: 0%"></div></div></div>
        </div>
        <div class="camera-box">WEBCAM</div>
    </div>

    <button class="settings-btn" onclick="toggleConfig()">⚙️</button>
    <div class="config-panel" id="configPanel">
        <input type="password" id="apiKey" class="config-input" placeholder="API Key">
        <button onclick="salvarKey()" class="btn-action" style="background:#0f8; color:#000;">SALVAR KEY</button>
        <div style="display:flex; gap:5px; margin: 10px 0;">
            <button onclick="setModo('live')" style="flex:1">AO VIVO</button>
            <button onclick="setModo('today')" style="flex:1">HOJE</button>
        </div>
        <button onclick="buscarJogos()" class="btn-action" style="background:#333; color:#fff;">BUSCAR/TESTAR</button>
        <input type="text" id="gameSearch" class="config-input" placeholder="Filtrar..." oninput="filtrar()">
        <div id="listaLive" style="max-height: 200px; overflow-y: auto; border: 1px solid #333;"></div>
    </div>

    <script>
        let KEY = localStorage.getItem('apiKey') || '';
        let loop = null, cacheLineup = null, jogosCache = [], modo = 'live';

        document.getElementById('apiKey').value = KEY;
        function toggleConfig() { document.getElementById('configPanel').classList.toggle('active'); }
        function salvarKey() { KEY = document.getElementById('apiKey').value; localStorage.setItem('apiKey', KEY); alert("Key salva!"); }

        async function buscarJogos() {
            if(!KEY) return;
            // CORREÇÃO: Formatação da data YYYY-MM-DD correta para a API
            const hoje = new Date().toISOString().split('T')[0];
            const path = modo === 'live' ? 'fixtures?live=all' : `fixtures?date=${hoje}`;
            const r = await fetch(`https://v3.football.api-sports.io/${path}`, { headers: { 'x-apisports-key': KEY } });
            const d = await r.json();
            jogosCache = d.response || [];
            filtrar();
        }

        function setModo(m) { modo = m; buscarJogos(); }

        function filtrar() {
            const t = document.getElementById('gameSearch').value.toLowerCase();
            const f = jogosCache.filter(j => j.teams.home.name.toLowerCase().includes(t) || j.teams.away.name.toLowerCase().includes(t));
            document.getElementById('listaLive').innerHTML = f.map(j => `
                <div style="padding:8px; border-bottom:1px solid #222; cursor:pointer; font-size:11px" onclick="selecionar(${j.fixture.id})">
                    ${j.teams.home.name} x ${j.teams.away.name} [${j.fixture.status.elapsed || 0}']
                </div>`).join('');
        }

        async function selecionar(id) {
            toggleConfig();
            if(loop) clearInterval(loop);
            cacheLineup = null;
            await atualizar(id);
            loop = setInterval(() => atualizar(id), 30000);
        }

        async function atualizar(id) {
            try {
                const [m, s] = await Promise.all([
                    fetch(`https://v3.football.api-sports.io/fixtures?id=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json()),
                    fetch(`https://v3.football.api-sports.io/fixtures/statistics?fixture=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json())
                ]);
                const f = m.response[0];
                document.getElementById('teamA').innerText = f.teams.home.name;
                document.getElementById('teamB').innerText = f.teams.away.name;
                document.getElementById('logoA').src = f.teams.home.logo;
                document.getElementById('logoB').src = f.teams.away.logo;
                document.getElementById('scA').innerText = f.goals.home ?? 0;
                document.getElementById('scB').innerText = f.goals.away ?? 0;
                document.getElementById('timerVal').innerText = (f.fixture.status.elapsed || 0) + "'";

                if(!cacheLineup) {
                    const l = await fetch(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json());
                    cacheLineup = l.response;
                    renderLists();
                }
                updateStats(s.response);
                renderPitch();
            } catch(e) { console.error("Erro na atualização:", e); }
        }

        function renderLists() {
            const draw = (idx, listId, hId) => {
                const t = cacheLineup[idx];
                document.getElementById(hId).innerText = t.team.name;
                document.getElementById(listId).innerHTML = t.startXI.map(p => `
                    <div class="player-row" onmouseenter="highlight(${p.player.id})" onmouseleave="unhighlight(${p.player.id})">
                        <b style="color:#0f8; width:15px">${p.player.number}</b> ${p.player.name}
                    </div>`).join('');
            };
            draw(0, 'listA', 'hA'); draw(1, 'listB', 'hB');
        }

        function renderPitch() {
            const p = document.getElementById('pitch'); p.innerHTML = '';
            cacheLineup.forEach((team, idx) => {
                const home = idx === 0;
                team.startXI.forEach(pl => {
                    const [r, c] = pl.player.grid.split(':').map(Number);
                    const top = home ? 95 - (r * 12) : (r * 12);
                    const left = home ? (c * 20) : 100 - (c * 20);
                    p.innerHTML += `<div class="player-dot ${home?'home':'away'}" style="top:${top}%; left:${left}%" data-id="${pl.player.id}">${pl.player.number}</div>`;
                });
            });
        }

        function updateStats(s) {
            if(!s || s.length < 2) return;
            // MAPEAMENTO COMPLETO DAS 7 INFOS
            const map = { 'Pos':'Ball Possession', 'SOn':'Shots on Goal', 'Shot':'Total Shots', 'Corn':'Corner Kicks', 'Foul':'Fouls', 'Card':'Yellow Cards', 'Off':'Offsides' };
            Object.keys(map).forEach(id => {
                const type = map[id];
                const vA = parseInt(s[0].statistics.find(x => x.type === type)?.value) || 0;
                const vB = parseInt(s[1].statistics.find(x => x.type === type)?.value) || 0;
                document.getElementById('v'+id+'A').innerText = type.includes('Possession') ? vA+'%' : vA;
                document.getElementById('v'+id+'B').innerText = type.includes('Possession') ? vB+'%' : vB;
                const tot = (vA + vB) || 1;
                document.getElementById('b'+id+'A').style.width = (vA/tot*100)+'%';
                document.getElementById('b'+id+'B').style.width = (vB/tot*100)+'%';
            });
        }

        window.highlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.add('highlight');
        window.unhighlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.remove('highlight');
        if(KEY) buscarJogos();
    </script>
</body>
</html>
