<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Streamer Dashboard Ultra - Alinhado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1920px; height: 1080px; background: #070707; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* BANNER STATUS */
        .match-status-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 30px;
            background: #111; display: flex; align-items: center; justify-content: center;
            font-weight: 900; text-transform: uppercase; font-size: 12px;
            border-bottom: 1px solid #333; z-index: 100;
        }
        .status-danger { background: #b00; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* PLACAR - ALINHADO COM O CENTRO */
        .scoreboard { 
            position: absolute; top: 45px; left: 610px; width: 730px; /* Alinhado com a largura da center-area */
            background: #151515; padding: 8px; display: flex; align-items: center; justify-content: center; gap: 25px; 
            border-radius: 10px; border: 1px solid #333; z-index: 10; 
        }
        .team { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .score { font-size: 45px; color: #0f8; min-width: 110px; text-align: center; font-family: 'Monaco', monospace; }

        /* LISTAS ESQUERDA - DIMINUÍDAS COM SCROLL */
        .lists-wrapper { position: absolute; top: 110px; left: 25px; width: 560px; display: flex; gap: 15px; }
        .team-list { width: 270px; }
        .team-header { background: #0f8; color: #000; padding: 8px; border-radius: 6px 6px 0 0; font-weight: 900; display: flex; gap: 8px; align-items: center; font-size: 11px; }
        .players-container { background: rgba(15,15,15,0.9); border: 1px solid #333; padding: 5px; height: 600px; overflow-y: auto; border-radius: 0 0 6px 6px; }
        .player-row { display: flex; align-items: center; gap: 8px; padding: 8px; margin: 3px 0; background: #1a1a1a; border-radius: 4px; font-size: 11px; cursor: pointer; border-left: 3px solid transparent; }
        .player-row:hover { border-left-color: #0f8; background: #252525; }

        /* CAMPO CENTRAL - ALINHADO */
        .center-area { position: absolute; top: 110px; left: 610px; width: 730px; display: flex; flex-direction: column; align-items: center; }
        .pitch-container { 
            position: relative; width: 500px; height: 680px; 
            background: #0a1a10; border: 2px solid #0f8; border-radius: 8px; 
            overflow: hidden; box-shadow: inset 0 0 40px #000; margin-top: 10px;
        }
        .player-dot { position: absolute; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transform: translate(-50%, -50%); border: 2px solid #000; z-index: 5; transition: 0.2s; }
        .player-dot.home { background: #0f8; color: #000; }
        .player-dot.away { background: #fff; color: #000; }
        .player-dot.highlight { transform: translate(-50%, -50%) scale(1.7) !important; box-shadow: 0 0 20px #0f8; z-index: 100; }

        /* LADO DIREITO: ESTATÍSTICAS + CAMERA */
        .right-sidebar { position: absolute; top: 110px; right: 30px; width: 520px; display: flex; flex-direction: column; gap: 15px; }
        .stats-pro { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 15px; }
        .stat-box { margin-bottom: 12px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        .stat-bar-outer { height: 8px; background: #222; border-radius: 4px; display: flex; overflow: hidden; border: 1px solid #333; }
        .bar-h { background: #0f8; height: 100%; transition: 1s ease; }
        .bar-a { background: #fff; height: 100%; transition: 1s ease; }
        .camera-box { width: 520px; height: 292px; border: 2px solid #333; border-radius: 12px; background: #000; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; text-transform: uppercase; font-size: 14px; }

        /* CONFIGURAÇÕES (REVERTIDO PARA O ORIGINAL) */
        .settings-btn { position: fixed; top: 5px; right: 10px; background: none; border: none; color: #333; cursor: pointer; z-index: 1001; font-size: 14px; }
        .settings-btn:hover { color: #0f8; }
        .config-panel { position: fixed; top: 35px; right: 10px; width: 350px; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 10px 30px #000; }
        .config-panel.active { display: block; }
        .search-box input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; margin-bottom: 10px; }
        .live-list { max-height: 250px; overflow-y: auto; border: 1px solid #222; border-radius: 4px; }
        .live-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 12px; }
        .live-item:hover { background: #222; }
        .live-item span { color: #0f8; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div class="match-status-banner" id="matchStatus">BOLA EM JOGO</div>

    <div class="scoreboard">
        <div class="team"><img id="logoA" src=""> <span id="teamA">TIME A</span></div>
        <div class="score"><span id="scA">0</span> - <span id="scB">0</span></div>
        <div class="team"><span id="teamB">TIME B</span> <img id="logoB" src=""></div>
    </div>

    <div class="lists-wrapper">
        <div class="team-list">
            <div class="team-header" id="hA">MANDANTE</div>
            <div class="players-container" id="listA"></div>
        </div>
        <div class="team-list">
            <div class="team-header" id="hB">VISITANTE</div>
            <div class="players-container" id="listB"></div>
        </div>
    </div>

    <div class="center-area">
        <div id="timerVal" style="font-size: 22px; color: #0f8; font-weight: 900; margin-bottom: 5px;">--'</div>
        <div class="pitch-container" id="pitch"></div>
    </div>

    <div class="right-sidebar">
        <div class="stats-pro">
            <div class="stat-box"><div class="stat-label"><span id="vPosA">50%</span> POSSE <span id="vPosB">50%</span></div><div class="stat-bar-outer"><div id="bPosA" class="bar-h" style="width: 50%"></div><div id="bPosB" class="bar-a" style="width: 50%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vSOnA">0</span> NO GOL <span id="vSOnB">0</span></div><div class="stat-bar-outer"><div id="bSOnA" class="bar-h" style="width: 0%"></div><div id="bSOnB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vShotA">0</span> CHUTES <span id="vShotB">0</span></div><div class="stat-bar-outer"><div id="bShotA" class="bar-h" style="width: 0%"></div><div id="bShotB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vCornA">0</span> ESCANTEIOS <span id="vCornB">0</span></div><div class="stat-bar-outer"><div id="bCornA" class="bar-h" style="width: 0%"></div><div id="bCornB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vFoulA">0</span> FALTAS <span id="vFoulB">0</span></div><div class="stat-bar-outer"><div id="bFoulA" class="bar-h" style="width: 0%"></div><div id="bFoulB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vCardA">0</span> CARTÕES <span id="vCardB">0</span></div><div class="stat-bar-outer"><div id="bCardA" class="bar-h" style="width: 0%"></div><div id="bCardB" class="bar-a" style="width: 0%"></div></div></div>
            <div class="stat-box"><div class="stat-label"><span id="vOffA">0</span> IMPEDIMENTOS <span id="vOffB">0</span></div><div class="stat-bar-outer"><div id="bOffA" class="bar-h" style="width: 0%"></div><div id="bOffB" class="bar-a" style="width: 0%"></div></div></div>
        </div>
        <div class="camera-box">WEBCAM STREAMER</div>
    </div>

    <button class="settings-btn" onclick="toggleConfig()">⚙️ CONFIGS</button>
    
    <div class="config-panel" id="configPanel">
        <input type="password" id="apiKey" placeholder="Cole sua API Key" style="width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 10px;">
        <button onclick="salvarKey()" style="width:100%; padding:10px; background:#0f8; border:none; cursor:pointer; font-weight:bold; margin-bottom:10px;">SALVAR API KEY</button>
        
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button onclick="setModo('live')" style="flex:1; padding:8px; background:#222; color:#fff; border:1px solid #333; cursor:pointer; font-size:10px;">AO VIVO</button>
            <button onclick="setModo('today')" style="flex:1; padding:8px; background:#222; color:#fff; border:1px solid #333; cursor:pointer; font-size:10px;">JOGOS DE HOJE</button>
        </div>

        <input type="text" id="gameSearch" placeholder="🔍 Buscar time..." oninput="filtrarJogos()" style="width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; margin-bottom: 10px;">
        <div id="listaLive" class="live-list"></div>

        <div style="margin-top:15px; display:flex; gap:5px;">
            <button onclick="simular('danger')" style="flex:1; background:#500; color:#fff; border:none; padding:8px; cursor:pointer; font-size:10px;">ALERTA: ATAQUE</button>
            <button onclick="simular('normal')" style="flex:1; background:#222; color:#fff; border:none; padding:8px; cursor:pointer; font-size:10px;">NORMAL</button>
        </div>
    </div>

    <script>
        let KEY = localStorage.getItem('apiKey') || '';
        let loop = null, cacheLineup = null, jogosAoVivo = [], modo = 'live';

        document.getElementById('apiKey').value = KEY;
        function toggleConfig() { document.getElementById('configPanel').classList.toggle('active'); }
        function salvarKey() { KEY = document.getElementById('apiKey').value; localStorage.setItem('apiKey', KEY); carregarJogos(); }

        async function carregarJogos() {
            if(!KEY) return;
            const hoje = new Date().toISOString().split('T')[0];
            const path = modo === 'live' ? 'fixtures?live=all' : `fixtures?date=${hoje}`;
            const r = await fetch(`https://v3.football.api-sports.io/${path}`, { headers: { 'x-apisports-key': KEY } });
            const data = await r.json();
            jogosAoVivo = data.response || [];
            filtrarJogos();
        }

        function setModo(m) { modo = m; carregarJogos(); }

        function filtrarJogos() {
            const termo = document.getElementById('gameSearch').value.toLowerCase();
            const filtered = jogosAoVivo.filter(f => f.teams.home.name.toLowerCase().includes(termo) || f.teams.away.name.toLowerCase().includes(termo));
            document.getElementById('listaLive').innerHTML = filtered.map(f => `
                <div class="live-item" onclick="selecionarJogo(${f.fixture.id})">
                    ${f.teams.home.name} x ${f.teams.away.name} <span>${f.fixture.status.elapsed || 0}'</span>
                </div>`).join('') || '<div style="padding:10px; font-size:11px">Nenhum jogo encontrado</div>';
        }

        async function selecionarJogo(id) {
            toggleConfig();
            if(loop) clearInterval(loop);
            cacheLineup = null;
            await atualizar(id);
            loop = setInterval(() => atualizar(id), 30000);
        }

        async function atualizar(id) {
            const [m, s] = await Promise.all([
                fetch(`https://v3.football.api-sports.io/fixtures?id=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json()),
                fetch(`https://v3.football.api-sports.io/fixtures/statistics?fixture=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json())
            ]);
            const f = m.response[0];
            document.getElementById('teamA').innerText = f.teams.home.name;
            document.getElementById('teamB').innerText = f.teams.away.name;
            document.getElementById('logoA').src = f.teams.home.logo;
            document.getElementById('logoB').src = f.teams.away.logo;
            document.getElementById('scA').innerText = f.goals.home ?? 0;
            document.getElementById('scB').innerText = f.goals.away ?? 0;
            document.getElementById('timerVal').innerText = (f.fixture.status.elapsed || 0) + "'";

            if(!cacheLineup) {
                const l = await fetch(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${id}`, { headers: { 'x-apisports-key': KEY } }).then(r => r.json());
                cacheLineup = l.response;
                renderLists();
            }
            updateStats(s.response);
            renderPitch();
        }

        function renderLists() {
            const draw = (idx, listId, hId) => {
                const t = cacheLineup[idx];
                document.getElementById(hId).innerText = t.team.name.toUpperCase();
                document.getElementById(listId).innerHTML = t.startXI.map(p => `
                    <div class="player-row" onmouseenter="highlight(${p.player.id})" onmouseleave="unhighlight(${p.player.id})">
                        <b style="color:#0f8; width:18px">${p.player.number}</b> ${p.player.name}
                    </div>`).join('');
            };
            draw(0, 'listA', 'hA'); draw(1, 'listB', 'hB');
        }

        function renderPitch() {
            const pitch = document.getElementById('pitch'); pitch.innerHTML = '';
            cacheLineup.forEach((team, idx) => {
                const isHome = idx === 0;
                team.startXI.forEach(p => {
                    const [r, c] = p.player.grid.split(':').map(Number);
                    const top = isHome ? 95 - (r * 12) : (r * 12);
                    const left = isHome ? (c * 20) : 100 - (c * 20);
                    pitch.innerHTML += `<div class="player-dot ${isHome?'home':'away'}" style="top:${top}%; left:${left}%" data-id="${p.player.id}">${p.player.number}</div>`;
                });
            });
        }

        function updateStats(stats) {
            if(!stats || stats.length < 2) return;
            const map = { 'Pos':'Ball Possession', 'SOn':'Shots on Goal', 'Shot':'Total Shots', 'Corn':'Corner Kicks', 'Foul':'Fouls', 'Card':'Yellow Cards', 'Off':'Offsides' };
            Object.keys(map).forEach(id => {
                const type = map[id];
                const vA = parseInt(stats[0].statistics.find(x => x.type === type)?.value) || 0;
                const vB = parseInt(stats[1].statistics.find(x => x.type === type)?.value) || 0;
                document.getElementById('v'+id+'A').innerText = type.includes('Possession') ? vA+'%' : vA;
                document.getElementById('v'+id+'B').innerText = type.includes('Possession') ? vB+'%' : vB;
                const tot = (vA + vB) || 1;
                document.getElementById('b'+id+'A').style.width = (vA/tot*100)+'%';
                document.getElementById('b'+id+'B').style.width = (vB/tot*100)+'%';
            });
        }

        function simular(m) {
            const b = document.getElementById('matchStatus');
            if(m === 'danger') { b.innerText = "⚠️ ATAQUE PERIGOSO"; b.className = "match-status-banner status-danger"; }
            else { b.innerText = "BOLA EM JOGO"; b.className = "match-status-banner"; }
        }

        window.highlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.add('highlight');
        window.unhighlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.remove('highlight');
        if(KEY) carregarJogos();
    </script>
</body>
</html>
