<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Streamer Dashboard Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1920px; height: 1080px; background: #070707; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* BANNER STATUS */
        .match-status-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 30px;
            background: #111; display: flex; align-items: center; justify-content: center;
            font-weight: 900; text-transform: uppercase; font-size: 12px;
            border-bottom: 1px solid #333; z-index: 100;
        }
        .status-danger { background: #b00; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* PLACAR */
        .scoreboard { 
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%); 
            background: #151515; padding: 8px 35px; display: flex; gap: 25px; 
            border-radius: 10px; border: 1px solid #333; z-index: 10; 
        }
        .team { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .score { font-size: 45px; color: #0f8; min-width: 110px; text-align: center; font-family: 'Monaco', monospace; }

        /* LISTAS ESQUERDA */
        .lists-wrapper { position: absolute; top: 120px; left: 25px; width: 560px; display: flex; gap: 15px; }
        .team-list { width: 270px; }
        .team-header { background: #0f8; color: #000; padding: 10px; border-radius: 6px 6px 0 0; font-weight: 900; display: flex; gap: 8px; align-items: center; font-size: 11px; }
        .players-container { background: rgba(15,15,15,0.9); border: 1px solid #333; padding: 5px; height: 800px; overflow-y: auto; border-radius: 0 0 6px 6px; }
        .player-row { display: flex; align-items: center; gap: 8px; padding: 8px; margin: 3px 0; background: #1a1a1a; border-radius: 4px; font-size: 11px; cursor: pointer; border-left: 3px solid transparent; }
        .player-row:hover { border-left-color: #0f8; background: #252525; }

        /* CAMPO CENTRAL */
        .center-area { position: absolute; top: 120px; left: 600px; width: 750px; display: flex; flex-direction: column; align-items: center; }
        .pitch-container { 
            position: relative; width: 480px; height: 620px; 
            background: #0a1a10; border: 2px solid #0f8; border-radius: 8px; 
            overflow: hidden; box-shadow: inset 0 0 40px #000; margin-top: 15px;
        }
        .player-dot { position: absolute; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transform: translate(-50%, -50%); border: 2px solid #000; z-index: 5; transition: 0.2s; }
        .player-dot.home { background: #0f8; color: #000; }
        .player-dot.away { background: #fff; color: #000; }
        .player-dot.highlight { transform: translate(-50%, -50%) scale(1.7) !important; box-shadow: 0 0 20px #0f8; z-index: 100; }

        /* LADO DIREITO: ESTATÍSTICAS + CAMERA */
        .right-sidebar { position: absolute; top: 120px; right: 30px; width: 500px; display: flex; flex-direction: column; gap: 20px; }
        
        .stats-pro { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .stat-box { margin-bottom: 15px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .stat-bar-outer { height: 10px; background: #222; border-radius: 5px; display: flex; overflow: hidden; border: 1px solid #333; }
        .bar-h { background: #0f8; height: 100%; transition: 1s ease; }
        .bar-a { background: #fff; height: 100%; transition: 1s ease; }

        .camera-box { 
            width: 500px; height: 281px; border: 2px solid #333; border-radius: 12px; 
            background: #000; display: flex; align-items: center; justify-content: center;
            color: #444; font-weight: bold; text-transform: uppercase;
        }

        /* CONFIGURAÇÕES */
        .settings-btn { position: fixed; top: 5px; right: 5px; background: none; border: none; color: #444; cursor: pointer; z-index: 1001; font-size: 16px; }
        .settings-btn:hover { color: #0f8; }
        
        .config-panel { 
            position: fixed; top: 40px; right: 10px; width: 350px; 
            background: #1a1a1a; border: 1px solid #333; padding: 15px; 
            border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 10px 30px #000;
        }
        .config-panel.active { display: block; }
        
        .search-box { position: relative; margin-bottom: 10px; }
        .search-box input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; }
        .live-list { max-height: 300px; overflow-y: auto; border: 1px solid #222; border-radius: 4px; }
        .live-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 12px; }
        .live-item:hover { background: #222; }
        .live-item span { color: #0f8; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div class="match-status-banner" id="matchStatus">BOLA EM JOGO</div>

    <div class="scoreboard">
        <div class="team"><img id="logoA" src=""> <span id="teamA">TIME A</span></div>
        <div class="score"><span id="scA">0</span> - <span id="scB">0</span></div>
        <div class="team"><span id="teamB">TIME B</span> <img id="logoB" src=""></div>
    </div>

    <div class="lists-wrapper">
        <div class="team-list">
            <div class="team-header" id="hA">MANDANTE</div>
            <div class="players-container" id="listA"></div>
        </div>
        <div class="team-list">
            <div class="team-header" id="hB">VISITANTE</div>
            <div class="players-container" id="listB"></div>
        </div>
    </div>

    <div class="center-area">
        <div id="timerVal" style="font-size: 24px; color: #0f8; font-weight: 900;">--'</div>
        <div class="pitch-container" id="pitch"></div>
    </div>

    <div class="right-sidebar">
        <div class="stats-pro">
            <div class="stat-box">
                <div class="stat-label"><span id="vPosA">50%</span> POSSE DE BOLA <span id="vPosB">50%</span></div>
                <div class="stat-bar-outer"><div id="bPosA" class="bar-h" style="width: 50%"></div><div id="bPosB" class="bar-a" style="width: 50%"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label"><span id="vShotA">0</span> FINALIZAÇÕES <span id="vShotB">0</span></div>
                <div class="stat-bar-outer"><div id="bShotA" class="bar-h" style="width: 0%"></div><div id="bShotB" class="bar-a" style="width: 0%"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label"><span id="vCornA">0</span> ESCANTEIOS <span id="vCornB">0</span></div>
                <div class="stat-bar-outer"><div id="bCornA" class="bar-h" style="width: 0%"></div><div id="bCornB" class="bar-a" style="width: 0%"></div></div>
            </div>
        </div>

        <div class="camera-box">AREA DA CAMERA (OBS)</div>
    </div>

    <button class="settings-btn" onclick="toggleConfig()">⚙️</button>
    
    <div class="config-panel" id="configPanel">
        <input type="password" id="apiKey" placeholder="API Key API-Sports" style="width:100%; padding:8px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px;">
        <button onclick="salvarKey()" style="width:100%; padding:8px; background:#0f8; border:none; cursor:pointer; font-weight:bold; margin-bottom:10px;">SALVAR CONFIG</button>
        
        <div class="search-box">
            <input type="text" id="gameSearch" placeholder="🔍 Buscar time ao vivo..." oninput="filtrarJogos()">
        </div>
        
        <div id="listaLive" class="live-list">
            <div style="padding:10px; color:#666; text-align:center">Clique em "Salvar" para carregar jogos...</div>
        </div>

        <div style="margin-top:15px; display:flex; gap:5px;">
            <button onclick="simular('danger')" style="flex:1; background:#500; color:#fff; padding:5px; border:none; cursor:pointer; font-size:10px;">MOMENTUM: PERIGO</button>
            <button onclick="simular('normal')" style="flex:1; background:#222; color:#fff; padding:5px; border:none; cursor:pointer; font-size:10px;">NORMALIZAR</button>
        </div>
    </div>

    <script>
        let KEY = localStorage.getItem('apiKey') || '';
        let loop = null;
        let cacheLineup = null;
        let jogosAoVivo = [];

        document.getElementById('apiKey').value = KEY;

        function toggleConfig() { document.getElementById('configPanel').classList.toggle('active'); }

        function salvarKey() {
            KEY = document.getElementById('apiKey').value;
            localStorage.setItem('apiKey', KEY);
            carregarJogosAoVivo();
        }

        async function api(path) {
            const r = await fetch(`https://v3.football.api-sports.io/${path}`, {
                headers: { 'x-apisports-key': KEY }
            });
            return r.json();
        }

        async function carregarJogosAoVivo() {
            const data = await api(`fixtures?live=all`);
            jogosAoVivo = data.response || [];
            filtrarJogos();
        }

        function filtrarJogos() {
            const termo = document.getElementById('gameSearch').value.toLowerCase();
            const filtered = jogosAoVivo.filter(f => 
                f.teams.home.name.toLowerCase().includes(termo) || 
                f.teams.away.name.toLowerCase().includes(termo)
            );

            document.getElementById('listaLive').innerHTML = filtered.map(f => `
                <div class="live-item" onclick="selecionarJogo(${f.fixture.id})">
                    ${f.teams.home.name} x ${f.teams.away.name}
                    <span>${f.fixture.status.elapsed}'</span>
                </div>
            `).join('') || '<div style="padding:10px; color:#666">Nenhum jogo ao vivo encontrado</div>';
        }

        async function selecionarJogo(id) {
            toggleConfig();
            if(loop) clearInterval(loop);
            cacheLineup = null;
            await atualizar(id);
            loop = setInterval(() => atualizar(id), 30000);
        }

        async function atualizar(id) {
            try {
                const [main, stats] = await Promise.all([
                    api(`fixtures?id=${id}`),
                    api(`fixtures/statistics?fixture=${id}`)
                ]);
                
                const f = main.response[0];
                document.getElementById('teamA').innerText = f.teams.home.name;
                document.getElementById('teamB').innerText = f.teams.away.name;
                document.getElementById('logoA').src = f.teams.home.logo;
                document.getElementById('logoB').src = f.teams.away.logo;
                document.getElementById('scA').innerText = f.goals.home ?? 0;
                document.getElementById('scB').innerText = f.goals.away ?? 0;
                document.getElementById('timerVal').innerText = f.fixture.status.elapsed + "'";

                if(!cacheLineup) {
                    const line = await api(`fixtures/lineups?fixture=${id}`);
                    cacheLineup = line.response;
                    renderLists();
                }
                updateStats(stats.response);
                renderPitch();
            } catch(e) { console.error("Erro ao atualizar:", e); }
        }

        function renderLists() {
            const draw = (idx, listId, headerId) => {
                const team = cacheLineup[idx];
                document.getElementById(headerId).innerText = team.team.name.toUpperCase();
                document.getElementById(listId).innerHTML = team.startXI.map(p => `
                    <div class="player-row" onmouseenter="highlight(${p.player.id})" onmouseleave="unhighlight(${p.player.id})">
                        <b style="color:#0f8; width:18px">${p.player.number}</b> ${p.player.name}
                    </div>
                `).join('');
            };
            draw(0, 'listA', 'hA'); draw(1, 'listB', 'hB');
        }

        function renderPitch() {
            const pitch = document.getElementById('pitch');
            pitch.innerHTML = '';
            cacheLineup.forEach((team, idx) => {
                const isHome = idx === 0;
                team.startXI.forEach(p => {
                    const [r, c] = p.player.grid.split(':').map(Number);
                    const top = isHome ? 95 - (r * 15) : (r * 15);
                    const left = isHome ? (c * 20) : 100 - (c * 20);
                    pitch.innerHTML += `<div class="player-dot ${isHome?'home':'away'}" style="top:${top}%; left:${left}%" data-id="${p.player.id}">${p.player.number}</div>`;
                });
            });
        }

        function updateStats(stats) {
            if(!stats || stats.length < 2) return;
            const getV = (tIdx, type) => parseInt(stats[tIdx].statistics.find(s => s.type === type)?.value) || 0;
            
            const pA = getV(0, "Ball Possession"), pB = getV(1, "Ball Possession");
            document.getElementById('vPosA').innerText = pA+"%"; document.getElementById('vPosB').innerText = pB+"%";
            document.getElementById('bPosA').style.width = pA+"%"; document.getElementById('bPosB').style.width = pB+"%";

            const sA = getV(0, "Total Shots"), sB = getV(1, "Total Shots");
            const sT = (sA + sB) || 1;
            document.getElementById('vShotA').innerText = sA; document.getElementById('vShotB').innerText = sB;
            document.getElementById('bShotA').style.width = (sA/sT*100)+"%"; document.getElementById('bShotB').style.width = (sB/sT*100)+"%";

            const cA = getV(0, "Corner Kicks"), cB = getV(1, "Corner Kicks");
            const cT = (cA + cB) || 1;
            document.getElementById('vCornA').innerText = cA; document.getElementById('vCornB').innerText = cB;
            document.getElementById('bCornA').style.width = (cA/cT*100)+"%"; document.getElementById('bCornB').style.width = (cB/cT*100)+"%";
        }

        function simular(m) {
            const b = document.getElementById('matchStatus');
            if(m === 'danger') { b.innerText = "⚠️ ATAQUE PERIGOSO"; b.className = "match-status-banner status-danger"; }
            else { b.innerText = "BOLA EM JOGO"; b.className = "match-status-banner"; }
        }

        window.highlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.add('highlight');
        window.unhighlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.remove('highlight');
        
        if(KEY) carregarJogosAoVivo();
    </script>
</body>
</html>
