<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Futebol Pro - Radar, Campinho & Histórico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1920px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* Telas */
        .login-screen { position: fixed; inset: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 20000; }
        .login-box { background: #1a1a1a; border: 2px solid #0f8; padding: 40px; width: 380px; text-align: center; border-radius: 12px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #0d0d0d; border: 1px solid #333; color: #fff; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background: #0f8; color: #000; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }

        /* Placar Principal */
        .scoreboard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; padding: 12px 40px; display: flex; gap: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10; }
        .team { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 700; }
        .team img { width: 50px; height: 50px; object-fit: contain; }
        .score { font-size: 56px; color: #0f8; min-width: 140px; text-align: center; font-family: 'Courier New', monospace; }

        /* Painel Central */
        .center-panel { position: absolute; top: 130px; left: 580px; width: 760px; height: 850px; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        /* Cronômetro Central */
        .match-timer-container { background: #111; border: 1px solid #333; padding: 10px 30px; border-radius: 30px; font-size: 22px; font-weight: bold; color: #0f8; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .pulse-dot { width: 10px; height: 10px; background: #f00; border-radius: 50%; animation: pulse 1s infinite; }
        
        /* Círculo de Eventos */
        .event-circle-wrapper { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .event-circle { width: 160px; height: 160px; border: 3px dashed #333; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; background: rgba(17,17,17,0.8); transition: all 0.5s ease; position: relative; }
        .event-circle.active-event { border: 3px solid #0f8; box-shadow: 0 0 30px rgba(0,255,136,0.3); animation: scaleUp 0.3s ease; }
        .event-circle .event-icon { font-size: 32px; margin-bottom: 5px; }
        .event-circle .event-player { font-size: 14px; font-weight: bold; color: #fff; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-circle .event-desc { font-size: 10px; color: #888; margin-top: 5px; text-transform: uppercase; }
        .event-circle .event-time { position: absolute; bottom: 5px; background: #222; padding: 2px 8px; border-radius: 10px; font-size: 10px; color: #0f8; font-weight: bold; }

        /* CAMPINHO TÁTICO */
        .pitch-container { position: relative; width: 340px; height: 420px; background: #0a1a10; border: 2px solid #0f8; border-radius: 8px; margin: 0 auto 15px auto; overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        .pitch-container::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(0, 255, 136, 0.4); transform: translateY(-50%); }
        .pitch-container::after { content: ''; position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid rgba(0, 255, 136, 0.4); border-radius: 50%; transform: translate(-50%, -50%); }
        .pitch-area-top { position: absolute; top: 0; left: 50%; width: 120px; height: 60px; border: 2px solid rgba(0, 255, 136, 0.4); border-top: none; transform: translateX(-50%); }
        .pitch-area-bottom { position: absolute; bottom: 0; left: 50%; width: 120px; height: 60px; border: 2px solid rgba(0, 255, 136, 0.4); border-bottom: none; transform: translateX(-50%); }

        /* Jogadores no Campinho */
        .player-dot { position: absolute; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transform: translate(-50%, -50%); border: 2px solid #000; z-index: 5; cursor: default; transition: 0.3s ease; box-shadow: 0 3px 5px rgba(0,0,0,0.5); }
        .player-dot.home { background: #0f8; color: #000; }
        .player-dot.away { background: #fff; color: #000; }
        
        .player-dot .tooltip { position: absolute; top: -25px; background: #000; color: #fff; padding: 4px 8px; font-size: 10px; border-radius: 4px; border: 1px solid #333; display: none; white-space: nowrap; pointer-events: none; z-index: 10; }
        .player-dot:hover .tooltip { display: block; }
        
        .dot-goal { animation: neonPulse 1s infinite; border-color: #fff; }
        .dot-yellow { border-color: #fc0; border-width: 3px; }
        .dot-red { background: #f00 !important; color: #fff !important; border-color: #fff; }

        /* Histórico de Eventos (Nova Tela) */
        .event-history-container { width: 100%; max-width: 500px; height: 160px; background: rgba(17,17,17,0.9); border: 1px solid #333; border-radius: 8px; overflow-y: auto; padding: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .event-history-container::-webkit-scrollbar { width: 6px; }
        .event-history-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-bottom: 1px solid #222; font-size: 13px; }
        .history-item:last-child { border-bottom: none; }
        .history-time { font-weight: 900; color: #0f8; min-width: 40px; text-align: center; background: #000; padding: 2px 4px; border-radius: 4px; }
        .history-icon { font-size: 16px; }
        .history-desc { flex: 1; color: #ddd; }
        .history-desc strong { color: #fff; }

        /* Listas de Escalamento Laterais */
        .team-list { position: absolute; top: 160px; width: 520px; }
        .team-list.left { left: 30px; }
        .team-list.right { right: 30px; }
        .team-header { background: #0f8; color: #000; padding: 12px; border-radius: 8px 8px 0 0; font-weight: 900; display: flex; gap: 10px; align-items: center; text-transform: uppercase; }
        .team-header img { width: 28px; height: 28px; }
        .players-container { background: rgba(0,0,0,0.9); border: 1px solid #333; padding: 10px; height: 750px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .player-row { display: flex; align-items: center; gap: 12px; padding: 10px; margin: 5px 0; background: #111; border-left: 4px solid #333; border-radius: 6px; }
        .player-row.titular { border-left-color: #0f8; }
        .player-num { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #0f8; font-size: 14px; }
        .player-info { flex: 1; }
        .player-name { font-size: 16px; font-weight: 600; }
        .player-icons { display: flex; gap: 6px; }
        .icon-badge { padding: 2px 6px; background: #222; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .icon-gol { background: #0f8; color: #000; }

        /* Controle Oculto */
        .toggle-btn { position: fixed; top: 15px; right: 15px; background: #0f8; color: #000; border: none; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 10000; font-size: 20px; }
        .control-panel { position: fixed; top: 75px; right: 15px; width: 400px; background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; display: none; z-index: 9999; box-shadow: -5px 5px 20px rgba(0,0,0,0.8); }
        .control-panel.active { display: block; }
        .control-panel input, .control-panel button, .control-panel select { width: 100%; padding: 10px; margin: 6px 0; background: #0d0d0d; border: 1px solid #333; color: #fff; border-radius: 6px; }
        #searchJogos { background: #222; border-color: #0f8; margin-top: 15px; font-weight: bold; }
        .lista-jogos { max-height: 250px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 5px; margin-top: 5px; border-radius: 6px; }
        .jogo-item { padding: 12px; margin: 4px 0; background: #111; border-radius: 4px; cursor: pointer; font-size: 13px; border-left: 4px solid transparent; }
        .jogo-item:hover { background: #1a1a1a; }
        .jogo-item.live { border-left-color: #f00; background: #1a0505; }
        .badge-live { background: #f00; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 8px; animation: pulse 1.5s infinite; }
        .log { font-size: 11px; color: #888; background: #000; padding: 8px; max-height: 80px; overflow-y: auto; margin-top: 10px; border-radius: 4px; }
        .btn-logout { background: #f44 !important; color: #fff !important; font-weight: bold; margin-top: 10px !important; border: none; cursor: pointer; }

        /* Animações */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes scaleUp { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        @keyframes neonPulse { 0% { box-shadow: 0 0 10px #0f8; } 50% { box-shadow: 0 0 25px #0f8, 0 0 10px #fff; } 100% { box-shadow: 0 0 10px #0f8; } }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2 style="margin-bottom:20px">⚽ DASHBOARD LIVE</h2>
        <input id="loginEmail" type="email" placeholder="Email">
        <input id="loginPass" type="password" placeholder="Senha">
        <button id="btnLogin">ENTRAR</button>
    </div>
</div>

<div id="dashboard" class="hidden">
    <button class="toggle-btn" id="btnToggle">⚙️</button>
    
    <div class="control-panel" id="panel">
        <div id="dataInfo" style="text-align:center; color:#0f8; font-weight:bold; margin-bottom:10px"></div>
        <label style="font-size: 11px; color: #aaa;">API KEY (FOOTBALL-API):</label>
        <input id="apiKey" type="password" placeholder="Cole sua Key aqui">
        <div style="display:flex;gap:5px">
            <button onclick="salvarKey()">Salvar Key</button>
            <button onclick="testarKey()" style="background:#f80">Testar</button>
        </div>
        <div id="keyStatus" style="font-size: 10px; margin-top: 4px;"></div>
        <select id="ligaSelect">
            <option value="all">Todas as Ligas</option>
            <option value="13">Libertadores</option>
            <option value="11">Sul-Americana</option>
            <option value="71">Brasileirão Série A</option>
            <option value="39">Premier League</option>
        </select>
        <button onclick="listarJogos()" style="background:#0f8; color:#000">BUSCAR JOGOS</button>
        <input type="text" id="searchJogos" placeholder="🔎 Buscar time..." onkeyup="filtrarJogos()">
        <div class="lista-jogos" id="listaJogos"></div>
        <div class="log" id="debugLog"></div>
        <button class="btn-logout" id="btnLogout">LOGOUT</button>
    </div>

    <div class="scoreboard">
        <div class="team"><img id="logoA" src=""><span id="teamA">Mandante</span></div>
        <div class="score"><span id="scoreA">0</span> x <span id="scoreB">0</span></div>
        <div class="team"><span id="teamB">Visitante</span><img id="logoB" src=""></div>
    </div>

    <div class="team-list left">
        <div class="team-header" id="headerA"><img id="hLogoA" src=""><span>---</span></div>
        <div class="players-container" id="playersA"></div>
    </div>

    <div class="center-panel">
        <div class="match-timer-container">
            <div class="pulse-dot" id="liveDot"></div>
            <span id="timerVal">Aguardando Jogo</span>
        </div>

        <div class="event-circle-wrapper">
            <div class="event-circle" id="eventCircle">
                <div class="event-icon" id="spotlightIcon">⚽</div>
                <div class="event-player" id="spotlightPlayer">Radar de Campo</div>
                <div class="event-desc" id="spotlightDesc">Selecione uma partida</div>
                <div class="event-time" id="spotlightTime">0'</div>
            </div>
        </div>

        <div class="pitch-container" id="pitchContainer">
            <div class="pitch-area-top"></div>
            <div class="pitch-area-bottom"></div>
            </div>

        <div class="event-history-container" id="eventHistory">
            <div style="text-align:center; color:#555; margin-top:20px; font-size:13px;">Nenhum evento registrado ainda.</div>
        </div>
    </div>

    <div class="team-list right">
        <div class="team-header" id="headerB"><img id="hLogoB" src=""><span>---</span></div>
        <div class="players-container" id="playersB"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = { apiKey: "AIzaSyDm1qde0ZvKUBzhEQDqst8UDPE_t1tOMp8", authDomain: "dashboard-futebol.firebaseapp.com", projectId: "dashboard-futebol" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    const elements = {
        loginScreen: document.getElementById('loginScreen'), dashboard: document.getElementById('dashboard'),
        panel: document.getElementById('panel'), listaJogos: document.getElementById('listaJogos'), searchJogos: document.getElementById('searchJogos'),
        debugLog: document.getElementById('debugLog'), scoreA: document.getElementById('scoreA'), scoreB: document.getElementById('scoreB'),
        teamA: document.getElementById('teamA'), teamB: document.getElementById('teamB'), logoA: document.getElementById('logoA'), logoB: document.getElementById('logoB'),
        keyStatus: document.getElementById('keyStatus'), timerVal: document.getElementById('timerVal'), liveDot: document.getElementById('liveDot'),
        eventCircle: document.getElementById('eventCircle'), spotlightIcon: document.getElementById('spotlightIcon'), spotlightPlayer: document.getElementById('spotlightPlayer'),
        spotlightDesc: document.getElementById('spotlightDesc'), spotlightTime: document.getElementById('spotlightTime'),
        pitchContainer: document.getElementById('pitchContainer'), eventHistory: document.getElementById('eventHistory')
    };

    let apiKey = '', timer = null, cacheJogos = [];

    document.getElementById('btnLogin').onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('btnToggle').onclick = () => elements.panel.classList.toggle('active');

    onAuthStateChanged(auth, user => { if (user) { elements.loginScreen.classList.add('hidden'); elements.dashboard.classList.remove('hidden'); init(); } });

    function init() {
        apiKey = localStorage.getItem('apiKey') || '';
        document.getElementById('apiKey').value = apiKey;
        document.getElementById('dataInfo').innerText = "DATA: " + new Date().toLocaleDateString('pt-BR');
        if(apiKey) elements.keyStatus.innerHTML = '<span style="color:#0f8">✓ Key carregada do sistema</span>';
    }

    function log(m) { elements.debugLog.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}<br>` + elements.debugLog.innerHTML; }

    window.salvarKey = () => {
        const inputVal = document.getElementById('apiKey').value.trim();
        if(inputVal) { apiKey = inputVal; localStorage.setItem('apiKey', apiKey); elements.keyStatus.innerHTML = '<span style="color:#0f8">✓ Key salva</span>'; log('Key atualizada.'); }
    };

    async function callAPI(url) {
        if(!apiKey) { log('Erro: Configure a Key primeiro'); return; }
        const r = await fetch(url, { headers: { 'x-apisports-key': apiKey } });
        const data = await r.json();
        if (data.errors && Object.keys(data.errors).length > 0) throw new Error(Object.values(data.errors)[0]);
        return data;
    }

    window.listarJogos = async () => {
        elements.listaJogos.innerHTML = 'Buscando jogos...';
        try {
            const hoje = new Date().toISOString().split('T')[0];
            const data = await callAPI(`https://v3.football.api-sports.io/fixtures?date=${hoje}`);
            cacheJogos = data.response || []; filtrarJogos(); log(`${cacheJogos.length} jogos carregados.`);
        } catch (e) { elements.listaJogos.innerHTML = 'Erro na API. Verifique sua Key.'; }
    };

    window.filtrarJogos = () => {
        const termo = elements.searchJogos.value.toLowerCase();
        const liga = document.getElementById('ligaSelect').value;
        const filtrados = cacheJogos.filter(j => {
            const matchSearch = j.teams.home.name.toLowerCase().includes(termo) || j.teams.away.name.toLowerCase().includes(termo);
            const matchLiga = liga === 'all' || String(j.league.id) === liga;
            return matchSearch && matchLiga;
        });
        if (!filtrados.length) { elements.listaJogos.innerHTML = '<div style="padding:10px">Nenhum jogo encontrado.</div>'; return; }
        elements.listaJogos.innerHTML = filtrados.map(j => {
            const isLive = ['1H', '2H', 'HT', 'ET', 'P'].includes(j.fixture.status.short);
            return `
                <div class="jogo-item ${isLive ? 'live' : ''}" onclick="selJogo(${j.fixture.id})">
                    ${isLive ? '<span class="badge-live">AO VIVO</span>' : ''}
                    <strong>${j.teams.home.name} ${j.goals.home ?? 0}x${j.goals.away ?? 0} ${j.teams.away.name}</strong><br>
                    <small style="color:#888">${j.league.name} (${j.fixture.status.short})</small>
                </div>`;
        }).join('');
    };

    window.testarKey = async () => {
        try {
            const j = await callAPI('https://v3.football.api-sports.io/status');
            elements.keyStatus.innerHTML = '<span style="color:#0f0">✓ KEY OK</span>';
        } catch (e) { elements.keyStatus.innerHTML = '<span style="color:#f44">❌ KEY INVÁLIDA</span>'; }
    };

    window.selJogo = async id => {
        if (timer) clearInterval(timer);
        log('Abrindo partida: ' + id);
        await carregarPartida(id);
        timer = setInterval(() => carregarPartida(id), 30000);
        elements.panel.classList.remove('active');
    };

    async function carregarPartida(id) {
        try {
            const data = await callAPI(`https://v3.football.api-sports.io/fixtures?id=${id}`);
            const j = data.response[0];
            
            elements.teamA.innerText = j.teams.home.name; elements.teamB.innerText = j.teams.away.name;
            elements.logoA.src = j.teams.home.logo; elements.logoB.src = j.teams.away.logo;
            elements.scoreA.innerText = j.goals.home ?? 0; elements.scoreB.innerText = j.goals.away ?? 0;
            
            updateTimer(j);

            const lineups = await callAPI(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${id}`);
            const events = await callAPI(`https://v3.football.api-sports.io/fixtures/events?fixture=${id}`);
            
            renderSide('A', lineups.response[0], events.response);
            renderSide('B', lineups.response[1], events.response);
            
            updateSpotlight(events.response);
            renderHistory(events.response);
            
            if(lineups.response.length >= 2) {
                renderPitch(lineups.response[0], lineups.response[1], events.response);
            }

        } catch (e) { log('Erro ao carregar partida: ' + e.message); }
    }

    function updateTimer(j) {
        const s = j.fixture.status.short;
        if (['1H', '2H'].includes(s)) { elements.timerVal.innerText = `${j.fixture.status.elapsed}'`; elements.liveDot.style.background = '#f00'; } 
        else if (s === 'HT') { elements.timerVal.innerText = "INTERVALO"; elements.liveDot.style.background = '#ff0'; } 
        else if (s === 'FT') { elements.timerVal.innerText = "FIM DE JOGO"; elements.liveDot.style.background = '#555'; } 
        else { elements.timerVal.innerText = s; elements.liveDot.style.background = '#555'; }
    }

    function updateSpotlight(events) {
        if (!events || events.length === 0) {
            elements.spotlightIcon.innerText = "⚽"; elements.spotlightPlayer.innerText = "BOLA ROLANDO";
            elements.spotlightDesc.innerText = "Aguardando lances da partida..."; elements.spotlightTime.innerText = "0'";
            elements.eventCircle.classList.remove('active-event'); return;
        }
        const latest = events[events.length - 1];
        elements.eventCircle.classList.add('active-event');
        let icon = "📢", desc = latest.detail || "";
        
        if (latest.type === "Goal") { icon = "⚽"; desc = `GOL! (${latest.detail})`; } 
        else if (latest.type === "Card") { icon = latest.detail.includes("Yellow") ? "🟨" : "🟥"; desc = latest.detail.includes("Yellow") ? "Cartão Amarelo" : "Cartão Vermelho"; } 
        else if (latest.type === "subst") { icon = "🔄"; desc = `Sai ${latest.player?.name || '--'} / Entra ${latest.assist?.name || '--'}`; } 
        else if (latest.type === "Var") { icon = "🖥️"; desc = `Decisão VAR: ${latest.detail}`; }

        elements.spotlightIcon.innerText = icon; elements.spotlightPlayer.innerText = latest.player?.name || "LANCE TÉCNICO";
        elements.spotlightDesc.innerText = desc; elements.spotlightTime.innerText = `${latest.time.elapsed}'`;
    }

    function renderHistory(events) {
        if (!events || events.length === 0) {
            elements.eventHistory.innerHTML = "<div style='text-align:center; color:#555; margin-top:20px; font-size:13px;'>Nenhum evento registrado ainda.</div>";
            return;
        }
        
        // Inverte o array para mostrar do mais recente (topo) para o mais antigo (fundo)
        const reversedEvents = [...events].reverse();
        
        elements.eventHistory.innerHTML = reversedEvents.map(e => {
            let icon = "📢", desc = e.detail || "";
            let player = e.player?.name || "Desconhecido";
            
            if (e.type === "Goal") { 
                icon = "⚽"; desc = `GOL! <strong>${player}</strong> (${e.detail})`; 
            } else if (e.type === "Card") { 
                icon = e.detail.includes("Yellow") ? "🟨" : "🟥"; desc = `Cartão ${e.detail.includes("Yellow") ? "Amarelo" : "Vermelho"} para <strong>${player}</strong>`; 
            } else if (e.type === "subst") { 
                icon = "🔄"; desc = `Substituição: Sai <strong>${player}</strong>, Entra <strong>${e.assist?.name || '--'}</strong>`; 
            } else if (e.type === "Var") { 
                icon = "🖥️"; desc = `VAR: ${e.detail} envolvendo <strong>${player}</strong>`; 
            }

            const timeStr = `${e.time.elapsed}'${e.time.extra ? ' +'+e.time.extra : ''}`;

            return `
                <div class="history-item">
                    <span class="history-time">${timeStr}</span>
                    <span class="history-icon">${icon}</span>
                    <span class="history-desc">${desc}</span>
                </div>
            `;
        }).join('');
    }

    function renderPitch(homeData, awayData, events) {
        elements.pitchContainer.innerHTML = '<div class="pitch-area-top"></div><div class="pitch-area-bottom"></div>';

        const addTeamToPitch = (data, isHome) => {
            if(!data || !data.startXI) return;
            let rows = {};
            data.startXI.forEach(p => {
                if(p.player.grid) {
                    let r = p.player.grid.split(':')[0];
                    if(!rows[r]) rows[r] = [];
                    rows[r].push(p);
                }
            });

            data.startXI.forEach(p => {
                if(!p.player.grid) return;
                let [r, c] = p.player.grid.split(':');
                r = parseInt(r); c = parseInt(c);
                let totalCols = rows[r].length;

                let top, left;
                if (isHome) {
                    top = 92 - ((r - 1) * 18);
                    left = (100 / (totalCols + 1)) * c;
                } else {
                    top = 8 + ((r - 1) * 18);
                    left = 100 - ((100 / (totalCols + 1)) * c);
                }

                const pEvents = events.filter(e => e.player.id === p.player.id);
                const hasGoal = pEvents.some(e => e.type === 'Goal');
                const hasYellow = pEvents.some(e => e.type === 'Card' && e.detail.includes('Yellow'));
                const hasRed = pEvents.some(e => e.type === 'Card' && e.detail.includes('Red'));

                let classes = `player-dot ${isHome ? 'home' : 'away'}`;
                if(hasRed) classes += ' dot-red';
                else if(hasYellow) classes += ' dot-yellow';
                if(hasGoal) classes += ' dot-goal';

                elements.pitchContainer.innerHTML += `
                    <div class="${classes}" style="top: ${top}%; left: ${left}%;">
                        ${p.player.number}
                        <div class="tooltip">${p.player.name}</div>
                    </div>
                `;
            });
        };

        addTeamToPitch(homeData, true);
        addTeamToPitch(awayData, false);
    }

    function renderSide(side, data, events) {
        const container = document.getElementById('players' + side);
        const header = document.getElementById('header' + side);
        if (!data) { container.innerHTML = "<p style='padding:20px; opacity:0.5'>Aguardando escalação...</p>"; return; }
        
        header.querySelector('span').innerText = data.team.name;
        header.querySelector('img').src = data.team.logo;

        container.innerHTML = data.startXI.map(p => {
            const pEvents = events.filter(e => e.player.id === p.player.id);
            const gols = pEvents.filter(e => e.type === 'Goal').length;
            const cardY = pEvents.filter(e => e.type === 'Card' && e.detail.includes('Yellow')).length;
            const cardR = pEvents.filter(e => e.type === 'Card' && e.detail.includes('Red')).length;

            return `
                <div class="player-row titular">
                    <div class="player-num">${p.player.number}</div>
                    <div class="player-info"><div class="player-name">${p.player.name}</div></div>
                    <div class="player-icons">
                        ${gols ? `<span class="icon-badge icon-gol">⚽ ${gols}</span>` : ''}
                        ${cardY ? `<span class="icon-badge" style="background:#fc0; color:#000">🟨</span>` : ''}
                        ${cardR ? `<span class="icon-badge" style="background:#f00; color:#fff">🟥</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
