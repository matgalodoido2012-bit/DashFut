<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Dashboard Final Corrigido</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{width:1920px;height:1080px;background:#0a0a0a;font-family:Inter;color:#fff;overflow:hidden}.login-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:20000}.login-box{background:#1a1a1a;border:2px solid #0f8;padding:40px;width:380px;text-align:center;border-radius:12px}.login-box input{width:100%;padding:12px;margin:8px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:6px}.login-box button{width:100%;padding:12px;background:#0f8;color:#000;border:none;border-radius:6px;font-weight:900;cursor:pointer}.hidden{display:none!important}.scoreboard{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;padding:12px 40px;display:flex;gap:30px;border-radius:12px}.team{display:flex;align-items:center;gap:10px;font-size:20px}.team img{width:32px;height:32px;border-radius:50%}.score{font-size:48px;color:#0f8;min-width:120px;text-align:center}.team-list{position:absolute;top:160px;width:520px}.team-list.left{left:30px}.team-list.right{right:30px}.team-header{background:#0f8;color:#000;padding:10px;border-radius:8px 8px 0 0;font-weight:900;display:flex;gap:10px;align-items:center}.team-header img{width:24px;height:24px;border-radius:50%}.players-container{background:#000;border:1px solid #333;padding:10px;max-height:710px;overflow-y:auto}.player-row{display:flex;align-items:center;gap:12px;padding:10px;margin:5px 0;background:#111;border-left:4px solid #333;border-radius:6px}.player-row.titular{border-left-color:#0f8}.player-row.sub-in{border-left-color:#fc0;background:#1a1500}.player-row.sub-out{opacity:.35}.player-num{width:32px;height:32px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900}.player-info{flex:1}.player-name{font-size:15px}.player-pos{font-size:11px;color:#888}.player-icons{display:flex;gap:4px}.icon-badge{padding:2px 6px;background:#222;border-radius:4px;font-size:12px}.icon-gol{background:#0f8;color:#000}.toggle-btn{position:fixed;top:10px;right:10px;background:#0f8;color:#000;border:none;padding:10px;border-radius:6px;cursor:pointer;z-index:10000}.control-panel{position:fixed;top:60px;right:10px;width:380px;background:#1a1a1a;border:1px solid #333;padding:15px;border-radius:8px;display:none;z-index:9999;max-height:90vh;overflow-y:auto}.control-panel.active{display:block}.control-panel input,.control-panel button,.control-panel select{width:100%;padding:8px;margin:5px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:4px}.control-panel button{background:#0f8;color:#000;font-weight:700;cursor:pointer}.lista-jogos{max-height:200px;overflow-y:auto;background:#000;border:1px solid #333;padding:5px}.jogo-item{padding:8px;margin:3px 0;background:#111;border-radius:4px;cursor:pointer;font-size:12px;border-left:3px solid transparent}.jogo-item.live{border-left-color:#0f8;background:#002a14}.log{font-size:11px;color:#888;background:#000;padding:5px;max-height:100px;overflow-y:auto;margin-top:10px}.data-info{background:#030;color:#0f8;padding:6px;text-align:center;border-radius:4px;font-size:11px;margin-bottom:8px}</style>
</head>
<body>
<div class="login-screen" id="loginScreen"><div class="login-box"><h2>⚽ DASHBOARD</h2><input id="loginEmail" placeholder="Email"><input id="loginPass" type="password" placeholder="Senha"><button id="btnLogin">ENTRAR</button></div></div>
<div id="dashboard" class="hidden">
<button class="toggle-btn" onclick="panel.classList.toggle('active')">⚙️</button>
<div class="control-panel" id="panel">
  <div class="data-info" id="dataInfo"></div>
  <input id="apiKey" type="text" placeholder="Cole sua API Key aqui" style="font-family:monospace">
  <div style="display:flex;gap:5px"><button onclick="salvarKey()" style="flex:2">Salvar</button><button onclick="testarKey()" style="flex:1;background:#f80">Testar</button></div>
  <div id="keyStatus" style="font-size:10px;color:#888"></div>
  <select id="ligaSelect"><option value="all">Todas</option><option value="13">Libertadores</option><option value="11">Sul-Americana</option><option value="71">Brasileirão</option><option value="39">Premier</option></select>
  <button onclick="listarJogos()">Buscar Jogos Hoje</button>
  <div class="lista-jogos" id="listaJogos"></div>
  <div class="log" id="debugLog"></div>
</div>
<div class="scoreboard"><div class="team"><img id="logoA"><span id="teamA">A</span></div><div class="score"><span id="scoreA">0</span> x <span id="scoreB">0</span></div><div class="team"><span id="teamB">B</span><img id="logoB"></div></div>
<div class="team-list left"><div class="team-header" id="headerA"><img id="hLogoA"><span>A</span></div><div class="players-container" id="playersA"></div></div>
<div class="team-list right"><div class="team-header" id="headerB"><img id="hLogoB"><span>B</span></div><div class="players-container" id="playersB"></div></div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getAuth,signInWithEmailAndPassword,onAuthStateChanged} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
initializeApp({apiKey:"AIzaSyDm1qde0ZvKUBzhEQDqst8UDPE_t1tOMp8",authDomain:"dashboard-futebol.firebaseapp.com",projectId:"dashboard-futebol"});
const auth=getAuth();

// DECLARAÇÕES CORRIGIDAS
const apiKeyEl=document.getElementById('apiKey');
const debugLog=document.getElementById('debugLog');
const listaJogos=document.getElementById('listaJogos');
const dataInfo=document.getElementById('dataInfo');
const keyStatus=document.getElementById('keyStatus');

btnLogin.onclick=async()=>{try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value)}catch(e){alert(e.message)}};
onAuthStateChanged(auth,u=>{if(u){loginScreen.classList.add('hidden');dashboard.classList.remove('hidden');init()}});

let apiKey='',reqCount=0,jogoAtual=null,homeId=null,awayId=null;
let initialXI={A:[],B:[]},subsMap={A:{},B:{}},eventsCache=[],timer=null;

function init(){
  apiKey=localStorage.getItem('apiKey')||'';
  apiKeyEl.value=apiKey;
  const hoje=new Date().toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'});
  dataInfo.innerText=`HOJE: ${hoje}`;
  if(apiKey) keyStatus.innerHTML=`<span style="color:#0f8">Key carregada: ${apiKey.slice(0,6)}...</span>`;
  log('Sistema pronto');
}
function log(m){debugLog.innerHTML=`[${new Date().toLocaleTimeString()}] ${m}<br>`+debugLog.innerHTML}

window.salvarKey=()=>{
  apiKey=apiKeyEl.value.trim().replace(/\s/g,''); // REMOVE ESPAÇOS
  localStorage.setItem('apiKey',apiKey);
  apiKeyEl.value=apiKey;
  keyStatus.innerHTML=`<span style="color:#0f8">✓ Salva: ${apiKey.slice(0,6)}...${apiKey.slice(-4)}</span>`;
  log('Key salva com '+apiKey.length+' caracteres');
};

window.testarKey=async()=>{
  if(!apiKey||apiKey.length<20){log('❌ Key muito curta');return}
  log('Testando...');
  try{
    const r=await fetch('https://v3.football.api-sports.io/status',{headers:{'x-apisports-key':apiKey}});
    const j=await r.json();
    if(r.ok){log(`✓ VÁLIDA! ${j.response.requests.current}/${j.response.requests.limit_day} usados`);keyStatus.innerHTML='<span style="color:#0f0">✓ KEY OK</span>'}
    else{log('❌ Inválida: '+j.message);keyStatus.innerHTML='<span style="color:#f00">❌ Inválida</span>'}
  }catch(e){log('Erro: '+e.message)}
};

async function callAPI(url){
  reqCount++;
  const r=await fetch(url,{headers:{'x-apisports-key':apiKey}});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function getHoje(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/Sao_Paulo'})}

window.listarJogos=async()=>{
  if(!apiKey)return alert('Salve a key primeiro');
  listaJogos.innerHTML='Buscando...';
  try{
    const hoje=getHoje();
    let url=`https://v3.football.api-sports.io/fixtures?date=${hoje}`;
    if(ligaSelect.value!=='all')url+=`&league=${ligaSelect.value}`;
    const data=await callAPI(url);
    const jogos=data.response||[];
    if(!jogos.length){listaJogos.innerHTML='Nenhum jogo hoje';return}
    listaJogos.innerHTML=jogos.map(j=>`<div class="jogo-item ${['1H','2H'].includes(j.fixture.status.short)?'live':''}" onclick="selJogo(${j.fixture.id})">${j.teams.home.name} ${j.goals.home??0}x${j.goals.away??0} ${j.teams.away.name}<br><small>${j.league.name}</small></div>`).join('');
    log(jogos.length+' jogos');
  }catch(e){log('Erro: '+e.message);listaJogos.innerHTML='Erro: '+e.message}
};

window.selJogo=async id=>{jogoAtual=id;if(timer)clearInterval(timer);await carregar();timer=setInterval(carregar,25000)};

async function carregar(){
  try{
    const d=await callAPI(`https://v3.football.api-sports.io/fixtures?id=${jogoAtual}`);const j=d.response[0];
    homeId=j.teams.home.id;awayId=j.teams.away.id;
    teamA.innerText=j.teams.home.name;teamB.innerText=j.teams.away.name;logoA.src=j.teams.home.logo;logoB.src=j.teams.away.logo;hLogoA.src=j.teams.home.logo;hLogoB.src=j.teams.away.logo;headerA.querySelector('span').innerText=j.teams.home.name;headerB.querySelector('span').innerText=j.teams.away.name;scoreA.innerText=j.goals.home??0;scoreB.innerText=j.goals.away??0;
    if(!initialXI.A.length){const l=await callAPI(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${jogoAtual}`);if(l.response.length){initialXI.A=l.response[0].startXI.map(p=>p.player);initialXI.B=l.response[1].startXI.map(p=>p.player);l.response[0].substitutes.forEach(s=>subsMap.A[s.player.id]=s.player);l.response[1].substitutes.forEach(s=>subsMap.B[s.player.id]=s.player)}}
    const ev=await callAPI(`https://v3.football.api-sports.io/fixtures/events?fixture=${jogoAtual}`);eventsCache=ev.response||[];atualizar();
  }catch(e){log('Falha: '+e.message)}
}
function atualizar(){['A','B'].forEach(t=>{const id=t==='A'?homeId:awayId;if(!initialXI[t].length)return;let xi=[...initialXI[t]];const st={};xi.forEach(p=>st[p.id]={g:0,am:0,vm:0});eventsCache.filter(e=>e.team.id===id).forEach(ev=>{const p=ev.player?.id;if(!p)return;if(!st[p])st[p]={g:0,am:0,vm:0};if(ev.type==='Goal')st[p].g++;if(ev.type==='Card')ev.detail.includes('Yellow')?st[p].am++:st[p].vm++;if(ev.type==='subst'){const o=ev.player.id,i=ev.assist?.id,ix=xi.findIndex(x=>x.id===o);if(ix>-1&&i){xi[ix]=subsMap[t][i]||{id:i,name:ev.assist.name,number:'?'};st[i]={g:0,am:0,vm:0}}}});document.getElementById('players'+t).innerHTML=xi.map(p=>{const s=st[p.id]||{};return`<div class="player-row titular"><div class="player-num">${p.number||''}</div><div class="player-info"><div class="player-name">${p.name}</div></div><div class="player-icons">${s.g?`<span class="icon-badge icon-gol">⚽${s.g}</span>`:''}${s.am?`<span class="icon-badge">🟨</span>`:''}${s.vm?`<span class="icon-badge">🟥</span>`:''}</div></div>`}).join('')})}
</script>
</body>
</html>
