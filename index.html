<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Futebol - Listas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#0a0a0a;font-family:'Inter',Arial,sans-serif;overflow:hidden;color:#fff}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:20000}
.login-box{background:#1a1a1a;border:2px solid #00ff88;border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h2{color:#00ff88;margin-bottom:20px}
.login-box input{width:100%;padding:12px;margin:8px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:6px}
.login-box button{width:100%;padding:12px;margin-top:10px;background:#00ff88;color:#000;border:none;border-radius:6px;font-weight:900;cursor:pointer}
.login-error{color:#ff4444;font-size:12px;margin-top:8px;display:none}
.hidden{display:none!important}

.scoreboard{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 40px;display:flex;align-items:center;gap:30px;z-index:10}
.team{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.team img{width:32px;height:32px;border-radius:50%}
.score{font-size:48px;font-weight:900;color:#00ff88;min-width:120px;text-align:center}
.timer{font-size:20px;color:#ffcc00;background:#000;padding:4px 12px;border-radius:6px}
.status{position:absolute;top:90px;left:50%;transform:translateX(-50%);font-size:12px;color:#888}
.req-counter{position:absolute;top:90px;right:20px;font-size:11px;color:#00ff88}

.team-list{position:absolute;top:160px;width:520px;height:760px;z-index:5}
.team-list.left{left:30px}
.team-list.right{right:30px}
.team-header{background:linear-gradient(90deg,#00ff88,#00cc6a);color:#000;padding:10px 15px;border-radius:8px 8px 0 0;font-weight:900;font-size:16px;display:flex;align-items:center;gap:10px}
.team-header img{width:24px;height:24px;border-radius:50%}
.players-container{background:rgba(0,0,0,.85);border:1px solid #333;border-top:none;border-radius:0 0 8px 8px;padding:10px;max-height:710px;overflow-y:auto}

.player-row{display:flex;align-items:center;gap:12px;padding:10px;margin:5px 0;background:#111;border-left:4px solid #333;border-radius:6px;transition:.2s}
.player-row.titular{border-left-color:#00ff88}
.player-row.sub-in{border-left-color:#ffcc00;background:#1a1500}
.player-row.sub-out{opacity:.35;border-left-color:#555}
.player-row:hover{background:#1a1a1a}

.player-num{width:32px;height:32px;background:#222;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.player-row.titular.player-num{background:#00ff88;color:#000}
.player-row.sub-in.player-num{background:#ffcc00;color:#000}

.player-info{flex:1}
.player-name{font-size:15px;font-weight:600}
.player-pos{font-size:11px;color:#888}

.player-icons{display:flex;gap:6px;align-items:center}
.icon-badge{background:#222;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:3px}
.icon-gol{background:#00ff88;color:#000}
.icon-amarelo{background:#ffcc00;color:#000}
.icon-vermelho{background:#ff4444;color:#fff}
.icon-sub{color:#ff8800}

.webcam-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:640px;height:360px;border:2px dashed rgba(255,255,255,.08);border-radius:8px;z-index:1}
.toggle-btn{position:fixed;top:10px;right:10px;z-index:10000;background:#00ff88;color:#000;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-weight:700}
.control-panel{position:fixed;top:60px;right:10px;width:380px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:15px;z-index:9999;display:none;max-height:90vh;overflow-y:auto}
.control-panel.active{display:block}
.control-panel input,.control-panel button,.control-panel select{width:100%;padding:8px;margin:5px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:4px}
.control-panel button{background:#00ff88;color:#000;font-weight:700;cursor:pointer}
.lista-jogos{max-height:180px;overflow-y:auto;background:#000;border:1px solid #333;border-radius:4px;padding:5px;margin:5px 0}
.jogo-item{padding:6px;margin:2px 0;background:#0d0d0d;border-radius:4px;cursor:pointer;font-size:12px}
.jogo-item:hover{background:#00ff88;color:#000}
.jogo-item.live{border-left:3px solid #00ff88}
.log{font-size:11px;color:#888;margin-top:10px;max-height:70px;overflow-y:auto;background:#000;padding:5px;border-radius:4px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>⚽ DASHBOARD</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Senha">
    <button id="btnLogin">ENTRAR</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="dashboard" class="hidden">
<button class="toggle-btn" onclick="document.getElementById('panel').classList.toggle('active')">⚙️</button>

<div class="control-panel" id="panel">
  <h3 style="color:#00ff88">Controle</h3>
  <input type="password" id="apiKey" placeholder="API-Football Key">
  <button onclick="salvarKey()">Salvar</button>
  <select id="ligaSelect">
    <option value="all">Todas</option>
    <option value="13">Libertadores</option>
    <option value="11">Sul-Americana</option>
    <option value="71">Brasileirão A</option>
    <option value="2">Champions</option>
    <option value="39">Premier League</option>
    <option value="140">La Liga</option>
    <option value="135">Serie A ITA</option>
    <option value="78">Bundesliga</option>
    <option value="128">Argentina</option>
    <option value="239">Colômbia</option>
  </select>
  <button onclick="listarJogos()">Buscar Jogos</button>
  <div class="lista-jogos" id="listaJogos"></div>
  <div class="log" id="debugLog"></div>
</div>

<div class="scoreboard">
  <div class="team"><img id="logoA" src=""><span id="teamA">TIME A</span></div>
  <div class="score"><span id="scoreA">0</span> x <span id="scoreB">0</span></div>
  <div class="team"><span id="teamB">TIME B</span><img id="logoB" src=""></div>
  <div class="timer" id="timer">00:00</div>
</div>
<div class="status" id="status">Aguardando...</div>
<div class="req-counter" id="reqCounter">Req: 0</div>

<div class="team-list left" id="teamListA">
  <div class="team-header" id="headerA"><img id="hLogoA" src=""><span>TIME A</span></div>
  <div class="players-container" id="playersA"></div>
</div>

<div class="team-list right" id="teamListB">
  <div class="team-header" id="headerB"><img id="hLogoB" src=""><span>TIME B</span></div>
  <div class="players-container" id="playersB"></div>
</div>

<div class="webcam-area"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {apiKey:"AIzaSyDm1qde0ZvKUBzhEQDqst8UDPE_t1tOMp8",authDomain:"dashboard-futebol.firebaseapp.com",projectId:"dashboard-futebol"};
initializeApp(firebaseConfig);
const auth=getAuth();

document.getElementById('btnLogin').onclick=async()=>{
  try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value)}catch(e){loginError.style.display='block';loginError.innerText=e.message}
};
onAuthStateChanged(auth,u=>{if(u){loginScreen.classList.add('hidden');dashboard.classList.remove('hidden');log('Logado')}});

let apiKey=localStorage.getItem('apiKey')||'',jogoAtual=null,reqCount=0,homeId=null,awayId=null;
let initialXI={A:[],B:[]},subsMap={A:{},B:{}},eventsCache=[];

function log(m){debugLog.innerHTML=`[${new Date().toLocaleTimeString()}] ${m}<br>`+debugLog.innerHTML}
function salvarKey(){apiKey=apiKeyEl.value.trim();localStorage.setItem('apiKey',apiKey);log('Key salva')}
const apiKeyEl=document.getElementById('apiKey');apiKeyEl.value=apiKey;

async function api(url){reqCount++;reqCounter.innerText='Req: '+reqCount;const r=await fetch(url,{headers:{'x-apisports-key':apiKey}});if(!r.ok)throw new Error(r.status);return r.json()}

async function listarJogos(){
  if(!apiKey)return alert('Coloque a key');
  const liga=ligaSelect.value;
  const datas=[-1,0,1].map(d=>new Date(Date.now()+d*86400000).toISOString().split('T')[0]);
  let jogos=[];
  for(const dt of datas){
    const url=liga==='all'?`https://v3.football.api-sports.io/fixtures?date=${dt}`:`https://v3.football.api-sports.io/fixtures?league=${liga}&season=2024&date=${dt}`;
    try{const d=await api(url);jogos=jogos.concat(d.response||[])}catch(e){}
  }
  if(!jogos.length){listaJogos.innerHTML='Nenhum jogo';return}
  listaJogos.innerHTML=jogos.map(j=>`<div class="jogo-item ${['1H','2H','HT'].includes(j.fixture.status.short)?'live':''}" onclick="selJogo(${j.fixture.id})">${j.teams.home.name} ${j.goals.home??0}x${j.goals.away??0} ${j.teams.away.name}<br><small>${j.league.name}</small></div>`).join('');
  log(jogos.length+' jogos encontrados')
}
window.selJogo=async id=>{jogoAtual=id;await carregarJogo();setInterval(carregarJogo,60000)}

async function carregarJogo(){
  const d=await api(`https://v3.football.api-sports.io/fixtures?id=${jogoAtual}`);const j=d.response[0];
  homeId=j.teams.home.id;awayId=j.teams.away.id;
  teamA.innerText=j.teams.home.name;teamB.innerText=j.teams.away.name;
  logoA.src=j.teams.home.logo;logoB.src=j.teams.away.logo;hLogoA.src=j.teams.home.logo;hLogoB.src=j.teams.away.logo;
  headerA.querySelector('span').innerText=j.teams.home.name;headerB.querySelector('span').innerText=j.teams.away.name;
  scoreA.innerText=j.goals.home??0;scoreB.innerText=j.goals.away??0;
  status.innerText=j.fixture.status.long;

  const lin=await api(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${jogoAtual}`);
  if(lin.response.length===2){setupTimes(lin.response[0],lin.response[1])}

  const ev=await api(`https://v3.football.api-sports.io/fixtures/events?fixture=${jogoAtual}`);eventsCache=ev.response||[];
  atualizarListas();
}

function setupTimes(tA,tB){
  initialXI.A=tA.startXI.map(p=>p.player);initialXI.B=tB.startXI.map(p=>p.player);
  subsMap.A={};tA.substitutes.forEach(s=>subsMap.A[s.player.id]=s.player);
  subsMap.B={};tB.substitutes.forEach(s=>subsMap.B[s.player.id]=s.player);
  log('Escalações carregadas')
}

function atualizarListas(){
  ['A','B'].forEach(time=>{
    const teamId=time==='A'?homeId:awayId;
    let xi=[...initialXI[time]];
    const status={};
    xi.forEach(p=>status[p.id]={gols:0,am:0,vm:0,out:false});

    // aplica eventos em ordem
    eventsCache.filter(e=>e.team.id===teamId).sort((a,b)=>a.time.elapsed-b.time.elapsed).forEach(ev=>{
      const pid=ev.player.id;
      if(ev.type==='Goal' && status[pid])status[pid].gols++;
      if(ev.type==='Card'){
        if(!status[pid])status[pid]={gols:0,am:0,vm:0,out:false};
        if(ev.detail.includes('Yellow'))status[pid].am++; else status[pid].vm++;
      }
      if(ev.type==='subst'){
        const outId=ev.player.id, inId=ev.assist.id;
        const idx=xi.findIndex(p=>p.id===outId);
        if(idx>-1){
          if(status[outId])status[outId].out=true;
          const novo=subsMap[time][inId]||{id:inId,name:ev.assist.name,number:'?',pos:'?'};
          xi[idx]=novo;
          status[inId]={gols:0,am:0,vm:0,out:false,in:true};
        }
      }
    });

    const html=xi.map(p=>{
      const st=status[p.id]||{};
      const cls=st.out?'sub-out':st.in?'sub-in':'titular';
      const icons=[];
      if(st.gols)icons.push(`<span class="icon-badge icon-gol">⚽${st.gols>1?st.gols:''}</span>`);
      if(st.am)icons.push(`<span class="icon-badge icon-amarelo">🟨</span>`);
      if(st.vm)icons.push(`<span class="icon-badge icon-vermelho">🟥</span>`);
      if(st.in)icons.push(`<span class="icon-badge icon-sub">↑</span>`);
      if(st.out)icons.push(`<span class="icon-badge icon-sub">↓</span>`);
      return `<div class="player-row ${cls}"><div class="player-num">${p.number||''}</div><div class="player-info"><div class="player-name">${p.name}</div><div class="player-pos">${p.pos||''}</div></div><div class="player-icons">${icons.join('')}</div></div>`
    }).join('');
    document.getElementById('players'+time).innerHTML=html;
  })
}
</script>
</body>
</html>
