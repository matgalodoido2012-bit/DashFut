<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard - Jogos do Dia FINAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#0a0a0a;font-family:Inter,Arial;color:#fff;overflow:hidden}
.login-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:20000}
.login-box{background:#1a1a1a;border:2px solid #00ff88;border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h2{color:#00ff88;margin-bottom:20px}
.login-box input{width:100%;padding:12px;margin:8px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:6px}
.login-box button{width:100%;padding:12px;margin-top:10px;background:#00ff88;color:#000;border:none;border-radius:6px;font-weight:900;cursor:pointer}
.login-error{color:#ff4444;font-size:12px;margin-top:8px;display:none}
.hidden{display:none!important}
.scoreboard{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 40px;display:flex;align-items:center;gap:30px;z-index:10}
.team{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.team img{width:32px;height:32px;border-radius:50%}
.score{font-size:48px;font-weight:900;color:#00ff88;min-width:120px;text-align:center}
.timer{font-size:20px;color:#ffcc00;background:#000;padding:4px 12px;border-radius:6px}
.status{position:absolute;top:90px;left:50%;transform:translateX(-50%);font-size:12px;color:#888}
.req-counter{position:absolute;top:90px;right:20px;font-size:11px;color:#00ff88}
.team-list{position:absolute;top:160px;width:520px;height:760px}
.team-list.left{left:30px}.team-list.right{right:30px}
.team-header{background:linear-gradient(90deg,#00ff88,#00cc6a);color:#000;padding:10px 15px;border-radius:8px 8px 0 0;font-weight:900;font-size:16px;display:flex;align-items:center;gap:10px}
.team-header img{width:24px;height:24px;border-radius:50%}
.players-container{background:rgba(0,0,0,.85);border:1px solid #333;border-top:none;border-radius:0 0 8px 8px;padding:10px;max-height:710px;overflow-y:auto}
.player-row{display:flex;align-items:center;gap:12px;padding:10px;margin:5px 0;background:#111;border-left:4px solid #333;border-radius:6px}
.player-row.titular{border-left-color:#00ff88}.player-row.sub-in{border-left-color:#ffcc00;background:#1a1500}.player-row.sub-out{opacity:.35}
.player-num{width:32px;height:32px;background:#222;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px}
.player-info{flex:1}.player-name{font-size:15px;font-weight:600}.player-pos{font-size:11px;color:#888}
.player-icons{display:flex;gap:6px}.icon-badge{background:#222;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:700}
.icon-gol{background:#00ff88;color:#000}.icon-amarelo{background:#ffcc00;color:#000}.icon-vermelho{background:#ff4444;color:#fff}
.webcam-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:640px;height:360px;border:2px dashed rgba(255,255,255,.08);border-radius:8px;z-index:1}
.toggle-btn{position:fixed;top:10px;right:10px;z-index:10000;background:#00ff88;color:#000;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-weight:700}
.control-panel{position:fixed;top:60px;right:10px;width:380px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:15px;z-index:9999;display:none;max-height:90vh;overflow-y:auto}
.control-panel.active{display:block}
.control-panel input,.control-panel button,.control-panel select{width:100%;padding:8px;margin:5px 0;background:#0d0d0d;border:1px solid #333;color:#fff;border-radius:4px}
.control-panel button{background:#00ff88;color:#000;font-weight:700;cursor:pointer}
.lista-jogos{max-height:220px;overflow-y:auto;background:#000;border:1px solid #333;border-radius:4px;padding:5px;margin:5px 0}
.jogo-item{padding:8px;margin:3px 0;background:#0d0d0d;border-radius:4px;cursor:pointer;font-size:12px;border-left:3px solid transparent}
.jogo-item:hover{background:#222}.jogo-item.live{border-left-color:#00ff88;background:#002a14}
.log{font-size:11px;color:#888;margin-top:10px;max-height:100px;overflow-y:auto;background:#000;padding:5px;border-radius:4px}
.data-info{background:#003300;color:#00ff88;padding:6px;border-radius:4px;font-size:11px;text-align:center;margin-bottom:8px}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen"><div class="login-box"><h2>⚽ DASHBOARD</h2><input id="loginEmail" type="email" placeholder="Email"><input id="loginPass" type="password" placeholder="Senha"><button id="btnLogin">ENTRAR</button><div id="loginError" class="login-error"></div></div></div>
<div id="dashboard" class="hidden">
<button class="toggle-btn" onclick="panel.classList.toggle('active')">⚙️</button>
<div class="control-panel" id="panel">
  <div class="data-info" id="dataInfo"></div>
  <input id="apiKey" type="password" placeholder="API-Football Key">
  <button onclick="salvarKey()">Salvar Key</button>
  <select id="ligaSelect">
    <option value="all">Todas as Ligas</option>
    <option value="13">Libertadores</option><option value="11">Sul-Americana</option>
    <option value="71">Brasileirão A</option><option value="72">Brasileirão B</option>
    <option value="2">Champions</option><option value="3">Europa League</option>
    <option value="39">Premier League</option><option value="140">La Liga</option>
    <option value="135">Serie A</option><option value="78">Bundesliga</option>
    <option value="128">Argentina</option><option value="239">Colômbia</option>
  </select>
  <button onclick="listarJogos()">🔍 BUSCAR JOGOS DE HOJE</button>
  <div class="lista-jogos" id="listaJogos"></div>
  <div class="log" id="debugLog"></div>
</div>
<div class="scoreboard"><div class="team"><img id="logoA"><span id="teamA">TIME A</span></div><div class="score"><span id="scoreA">0</span> x <span id="scoreB">0</span></div><div class="team"><span id="teamB">TIME B</span><img id="logoB"></div><div class="timer" id="timer">00:00</div></div>
<div class="status" id="status">Aguardando...</div><div class="req-counter" id="reqCounter">Req: 0</div>
<div class="team-list left"><div class="team-header" id="headerA"><img id="hLogoA"><span>TIME A</span></div><div class="players-container" id="playersA"></div></div>
<div class="team-list right"><div class="team-header" id="headerB"><img id="hLogoB"><span>TIME B</span></div><div class="players-container" id="playersB"></div></div>
<div class="webcam-area"></div></div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getAuth,signInWithEmailAndPassword,onAuthStateChanged} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
initializeApp({apiKey:"AIzaSyDm1qde0ZvKUBzhEQDqst8UDPE_t1tOMp8",authDomain:"dashboard-futebol.firebaseapp.com",projectId:"dashboard-futebol"});
const auth=getAuth();
btnLogin.onclick=async()=>{try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value)}catch(e){loginError.style.display='block';loginError.innerText=e.message}};
onAuthStateChanged(auth,u=>{if(u){loginScreen.classList.add('hidden');dashboard.classList.remove('hidden');init()}});

let apiKey='',reqCount=0,jogoAtual=null,updateTimer=null,homeId=null,awayId=null;
let initialXI={A:[],B:[]},subsMap={A:{},B:{}},eventsCache=[];

function init(){
  apiKey=localStorage.getItem('apiKey')||'';apiKeyEl.value=apiKey;
  const hoje=new Date().toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric'});
  dataInfo.innerText=`📅 HOJE: ${hoje} (Brasília)`;
  log('Pronto');
}
function log(m){debugLog.innerHTML=`[${new Date().toLocaleTimeString('pt-BR')}] ${m}<br>`+debugLog.innerHTML}
window.salvarKey=()=>{apiKey=apiKeyEl.value.trim();localStorage.setItem('apiKey',apiKey);log('✓ Key salva')};
function getHoje(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/Sao_Paulo'})}

async function callAPI(url,t=1){
  reqCount++;reqCounter.innerText=`Req: ${reqCount}`;
  try{
    const r=await fetch(url,{headers:{'x-apisports-key':apiKey}});
    if(r.status===401)throw new Error('KEY INVÁLIDA');
    if(r.status===429)throw new Error('LIMITE 100/dia');
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    if(j.errors&&Object.keys(j.errors).length)throw new Error(JSON.stringify(j.errors));
    return j;
  }catch(e){if(t<3){await new Promise(r=>setTimeout(r,1000));return callAPI(url,t+1)}throw e}
}

window.listarJogos=async()=>{
  if(!apiKey)return alert('Cole a key');
  listaJogos.innerHTML='Buscando...';
  const liga=ligaSelect.value,hoje=getHoje();
  try{
    log(`Buscando ${hoje}`);
    let url=`https://v3.football.api-sports.io/fixtures?date=${hoje}`;
    if(liga!=='all')url+=`&league=${liga}`; // SEM season - correção final
    const data=await callAPI(url);
    let jogos=data.response||[];
    if(jogos.length===0){listaJogos.innerHTML=`<div style="padding:15px;text-align:center;color:#ffaa00">Nenhum jogo hoje</div>`;log('0 jogos');return}
    jogos.sort((a,b)=> (['1H','2H','HT','ET','P'].includes(a.fixture.status.short)?0:1) - (['1H','2H','HT','ET','P'].includes(b.fixture.status.short)?0:1));
    listaJogos.innerHTML=jogos.map(j=>{
      const live=['1H','2H','HT','ET','P'].includes(j.fixture.status.short);
      const hora=new Date(j.fixture.date).toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      return `<div class="jogo-item ${live?'live':''}" onclick="selJogo(${j.fixture.id})"><strong>${j.teams.home.name}</strong> ${j.goals.home??0}x${j.goals.away??0} <strong>${j.teams.away.name}</strong><br><small>${live?`● ${j.fixture.status.elapsed}' AO VIVO`:hora} • ${j.league.name}</small></div>`;
    }).join('');
    log(`✓ ${jogos.length} jogos`);
  }catch(e){log('❌ '+e.message);listaJogos.innerHTML=`<div style="color:#f44;padding:10px">${e.message}</div>`}
};

window.selJogo=async id=>{jogoAtual=id;if(updateTimer)clearInterval(updateTimer);await carregarJogo();updateTimer=setInterval(carregarJogo,25000)};

async function carregarJogo(){
  try{
    const d=await callAPI(`https://v3.football.api-sports.io/fixtures?id=${jogoAtual}`);const j=d.response[0];
    homeId=j.teams.home.id;awayId=j.teams.away.id;
    teamA.innerText=j.teams.home.name;teamB.innerText=j.teams.away.name;
    logoA.src=j.teams.home.logo;logoB.src=j.teams.away.logo;hLogoA.src=j.teams.home.logo;hLogoB.src=j.teams.away.logo;
    headerA.querySelector('span').innerText=j.teams.home.name;headerB.querySelector('span').innerText=j.teams.away.name;
    scoreA.innerText=j.goals.home??0;scoreB.innerText=j.goals.away??0;
    status.innerText=j.fixture.status.long;timer.innerText=j.fixture.status.elapsed?`${j.fixture.status.elapsed}'`:'--';
    if(initialXI.A.length===0){
      try{const l=await callAPI(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${jogoAtual}`);if(l.response.length>=2){initialXI.A=l.response[0].startXI.map(p=>p.player);initialXI.B=l.response[1].startXI.map(p=>p.player);subsMap.A={};l.response[0].substitutes.forEach(s=>subsMap.A[s.player.id]=s.player);subsMap.B={};l.response[1].substitutes.forEach(s=>subsMap.B[s.player.id]=s.player);log('Escalações OK')}}catch{}
    }
    const ev=await callAPI(`https://v3.football.api-sports.io/fixtures/events?fixture=${jogoAtual}`);eventsCache=ev.response||[];atualizarListas();
    if(['FT','AET','PEN'].includes(j.fixture.status.short))clearInterval(updateTimer);
  }catch(e){log('Erro: '+e.message)}
}

function atualizarListas(){
  ['A','B'].forEach(t=>{
    const id=t==='A'?homeId:awayId;if(!initialXI[t].length)return;
    let xi=[...initialXI[t]];const st={};xi.forEach(p=>st[p.id]={g:0,am:0,vm:0,out:0,in:0});
    eventsCache.filter(e=>e.team.id===id).sort((a,b)=>a.time.elapsed-b.time.elapsed).forEach(ev=>{
      const pid=ev.player?.id;if(!pid)return;if(!st[pid])st[pid]={g:0,am:0,vm:0,out:0,in:0};
      if(ev.type==='Goal')st[pid].g++;if(ev.type==='Card'){ev.detail.includes('Yellow')?st[pid].am++:st[pid].vm++}
      if(ev.type==='subst'){const o=ev.player.id,i=ev.assist?.id,ix=xi.findIndex(p=>p.id===o);if(ix>-1&&i){st[o].out=1;const n=subsMap[t][i]||{id:i,name:ev.assist.name,number:'?'};xi[ix]=n;st[i]={g:0,am:0,vm:0,out:0,in:1}}}
    });
    const html=xi.map(p=>{const s=st[p.id]||{};const c=s.out?'sub-out':s.in?'sub-in':'titular';const ic=[];if(s.g)ic.push(`<span class="icon-badge icon-gol">⚽${s.g>1?s.g:''}</span>`);if(s.am)ic.push(`<span class="icon-badge icon-amarelo">${'🟨'.repeat(s.am)}</span>`);if(s.vm)ic.push(`<span class="icon-badge icon-vermelho">🟥</span>`);if(s.in)ic.push(`<span class="icon-badge">↑</span>`);return`<div class="player-row ${c}"><div class="player-num">${p.number||''}</div><div class="player-info"><div class="player-name">${p.name}</div><div class="player-pos">${p.pos||''}</div></div><div class="player-icons">${ic.join('')}</div></div>`}).join('');
    document.getElementById('players'+t).innerHTML=html;
  });
}
</script>
</body>
</html>
