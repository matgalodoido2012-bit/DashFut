<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Futebol - Layout Lateral Esquerdo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1920px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* BANNER STATUS */
        .match-status-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 35px;
            background: #111; display: flex; align-items: center; justify-content: center;
            font-weight: 900; text-transform: uppercase; font-size: 13px;
            border-bottom: 1px solid #333; z-index: 100;
        }
        .status-danger { background: #b00; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* PLACAR */
        .scoreboard { 
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%); 
            background: #1a1a1a; padding: 10px 40px; display: flex; gap: 30px; 
            border-radius: 12px; border: 1px solid #333; z-index: 10; 
        }
        .team { display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 700; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .score { font-size: 50px; color: #0f8; min-width: 120px; text-align: center; font-family: 'Courier New', monospace; }

        /* CONTAINER DAS LISTAS (AMBAS À ESQUERDA) */
        .lists-wrapper {
            position: absolute; top: 130px; left: 30px; width: 650px; 
            display: flex; gap: 20px;
        }
        .team-list { width: 310px; }
        .team-header { background: #0f8; color: #000; padding: 10px; border-radius: 8px 8px 0 0; font-weight: 900; display: flex; gap: 10px; align-items: center; font-size: 12px; }
        .team-header img { width: 20px; }
        .players-container { background: rgba(0,0,0,0.85); border: 1px solid #333; padding: 8px; height: 750px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .player-row { display: flex; align-items: center; gap: 10px; padding: 8px; margin: 4px 0; background: #111; border-radius: 4px; cursor: pointer; border-left: 3px solid #333; font-size: 12px; }
        .player-row:hover { background: #222; border-left-color: #0f8; }

        /* PAINEL CENTRAL (AGORA À DIREITA DAS LISTAS) */
        .center-panel { 
            position: absolute; top: 130px; left: 700px; width: 850px; 
            height: 900px; display: flex; flex-direction: column; align-items: center; 
        }
        
        .match-timer-container { background: #111; border: 1px solid #333; padding: 8px 25px; border-radius: 30px; font-size: 22px; font-weight: bold; color: #0f8; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

        /* CAMPO TÁTICO AMPLIAÇÃO */
        .pitch-container { 
            position: relative; width: 500px; height: 650px; 
            background: #0a1a10; border: 2px solid #0f8; border-radius: 10px; 
            margin-bottom: 25px; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); 
        }
        .player-dot { position: absolute; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; transform: translate(-50%, -50%); border: 2px solid #000; z-index: 5; transition: 0.2s; }
        .player-dot.home { background: #0f8; color: #000; }
        .player-dot.away { background: #fff; color: #000; }
        .player-dot.highlight { transform: translate(-50%, -50%) scale(1.8) !important; box-shadow: 0 0 25px #0f8; z-index: 100; }

        /* ESTATÍSTICAS */
        .stats-container { width: 500px; background: rgba(20,20,20,0.9); border: 1px solid #333; border-radius: 10px; padding: 15px; }
        .stat-line { margin-bottom: 12px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 5px; font-weight: 800; }
        .stat-bar-bg { height: 8px; background: #222; border-radius: 4px; display: flex; overflow: hidden; }
        .bar-h { background: #0f8; height: 100%; transition: 1s ease; }
        .bar-a { background: #fff; height: 100%; transition: 1s ease; }

        /* ESPAÇO PARA CÂMERA (CANTO DIREITO) */
        .camera-placeholder {
            position: absolute; bottom: 50px; right: 50px; width: 450px; height: 250px;
            border: 2px dashed rgba(0, 255, 136, 0.2); display: flex; align-items: center; justify-content: center;
            color: #0f8; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* PAINEL CONFIGURAÇÕES (RESTAURADO) */
        .toggle-btn { position: fixed; top: 15px; right: 15px; background: #0f8; color: #000; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 1000; font-size: 18px; }
        .control-panel { 
            position: fixed; top: 65px; right: 15px; width: 320px; 
            background: #1a1a1a; border: 1px solid #333; padding: 15px; 
            border-radius: 8px; display: none; z-index: 999; box-shadow: -5px 5px 20px rgba(0,0,0,0.5);
        }
        .control-panel.active { display: block; }
        input, button, select { width: 100%; padding: 10px; margin: 4px 0; background: #0d0d0d; color: #fff; border: 1px solid #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="match-status-banner" id="matchStatus">BOLA EM JOGO</div>

    <div class="scoreboard">
        <div class="team"><img id="logoA" src=""> <span id="teamA">TIME A</span></div>
        <div class="score"><span id="scA">0</span> x <span id="scB">0</span></div>
        <div class="team"><span id="teamB">TIME B</span> <img id="logoB" src=""></div>
    </div>

    <div class="lists-wrapper">
        <div class="team-list">
            <div class="team-header" id="hA"><span>MANDANTE</span></div>
            <div class="players-container" id="listA"></div>
        </div>
        <div class="team-list">
            <div class="team-header" id="hB"><span>VISITANTE</span></div>
            <div class="players-container" id="listB"></div>
        </div>
    </div>

    <div class="center-panel">
        <div class="match-timer-container">
            <span id="timerVal">--:--</span>
        </div>

        <div class="pitch-container" id="pitch"></div>

        <div class="stats-container">
            <div class="stat-line">
                <div class="stat-info"><span id="vPosA">50%</span> <span>POSSE DE BOLA</span> <span id="vPosB">50%</span></div>
                <div class="stat-bar-bg"><div id="bPosA" class="bar-h" style="width: 50%"></div><div id="bPosB" class="bar-a" style="width: 50%"></div></div>
            </div>
            <div class="stat-line">
                <div class="stat-info"><span id="vShotA">0</span> <span>FINALIZAÇÕES</span> <span id="vShotB">0</span></div>
                <div class="stat-bar-bg"><div id="bShotA" class="bar-h" style="width: 50%"></div><div id="bShotB" class="bar-a" style="width: 50%"></div></div>
            </div>
        </div>
    </div>

    <div class="camera-placeholder">Webcam Streamer</div>

    <button class="toggle-btn" onclick="document.querySelector('.control-panel').classList.toggle('active')">⚙️</button>
    
    <div class="control-panel">
        <input type="password" id="apiKey" placeholder="Cole sua API Key">
        <button onclick="salvarKey()">SALVAR KEY</button>
        <button onclick="buscarJogos()" style="background:#0f8; color:#000; font-weight:bold">BUSCAR JOGOS</button>
        <div id="lista" style="max-height: 150px; overflow-y: auto; background: #000; margin-top: 5px;"></div>
        <hr style="margin:10px 0; border-color:#333">
        <button onclick="simular('danger')" style="background:#500">SIMULAR ATAQUE</button>
        <button onclick="simular('normal')" style="background:#222">NORMALIZAR</button>
    </div>

    <script>
        let KEY = localStorage.getItem('apiKey') || '';
        let loop = null;
        let cacheLineup = null;

        document.getElementById('apiKey').value = KEY;

        function salvarKey() {
            KEY = document.getElementById('apiKey').value;
            localStorage.setItem('apiKey', KEY);
            alert('Configurado!');
        }

        async function api(path) {
            const r = await fetch(`https://v3.football.api-sports.io/${path}`, {
                headers: { 'x-apisports-key': KEY }
            });
            return r.json();
        }

        async function buscarJogos() {
            const date = new Date().toISOString().split('T')[0];
            const data = await api(`fixtures?date=${date}`);
            document.getElementById('lista').innerHTML = data.response.map(f => `
                <div style="padding:8px; border-bottom:1px solid #222; cursor:pointer; font-size:11px" onclick="iniciar(${f.fixture.id})">
                    ${f.teams.home.name} x ${f.teams.away.name} (${f.fixture.status.short})
                </div>
            `).join('');
        }

        async function iniciar(id) {
            document.querySelector('.control-panel').classList.remove('active');
            if(loop) clearInterval(loop);
            cacheLineup = null;
            await atualizar(id);
            loop = setInterval(() => atualizar(id), 30000);
        }

        async function atualizar(id) {
            try {
                const main = await api(`fixtures?id=${id}`);
                const stats = await api(`fixtures/statistics?fixture=${id}`);
                const f = main.response[0];

                document.getElementById('teamA').innerText = f.teams.home.name;
                document.getElementById('teamB').innerText = f.teams.away.name;
                document.getElementById('logoA').src = f.teams.home.logo;
                document.getElementById('logoB').src = f.teams.away.logo;
                document.getElementById('scA').innerText = f.goals.home || 0;
                document.getElementById('scB').innerText = f.goals.away || 0;
                document.getElementById('timerVal').innerText = (f.fixture.status.elapsed || 0) + "'";

                if(!cacheLineup) {
                    const line = await api(`fixtures/lineups?fixture=${id}`);
                    cacheLineup = line.response;
                    renderList(0, 'listA', 'hA');
                    renderList(1, 'listB', 'hB');
                }

                updateStatsDisplay(stats.response);
                renderPitch();
            } catch(e) { console.log(e); }
        }

        function renderList(idx, containerId, headerId) {
            const team = cacheLineup[idx];
            document.getElementById(headerId).innerHTML = `<img src="${team.team.logo}"> <span>${team.team.name}</span>`;
            document.getElementById(containerId).innerHTML = team.startXI.map(p => `
                <div class="player-row" onmouseenter="highlight(${p.player.id})" onmouseleave="unhighlight(${p.player.id})">
                    <b style="color:#0f8; width:20px">${p.player.number}</b> ${p.player.name}
                </div>
            `).join('');
        }

        function renderPitch() {
            const pitch = document.getElementById('pitch');
            pitch.innerHTML = '';
            cacheLineup.forEach((team, idx) => {
                const isHome = idx === 0;
                team.startXI.forEach(p => {
                    const [r, c] = p.player.grid.split(':').map(Number);
                    const top = isHome ? 95 - (r * 15) : (r * 15);
                    const left = isHome ? (c * 20) : 100 - (c * 20);
                    pitch.innerHTML += `<div class="player-dot ${isHome?'home':'away'}" style="top:${top}%; left:${left}%" data-id="${p.player.id}">${p.player.number}</div>`;
                });
            });
        }

        function updateStatsDisplay(stats) {
            if(!stats || stats.length < 2) return;
            const getVal = (tIdx, type) => parseInt(stats[tIdx].statistics.find(s => s.type === type)?.value) || 0;
            const pA = getVal(0, "Ball Possession"), pB = getVal(1, "Ball Possession");
            document.getElementById('vPosA').innerText = pA+"%"; document.getElementById('vPosB').innerText = pB+"%";
            document.getElementById('bPosA').style.width = pA+"%"; document.getElementById('bPosB').style.width = pB+"%";
            const sA = getVal(0, "Total Shots"), sB = getVal(1, "Total Shots");
            const sT = (sA + sB) || 1;
            document.getElementById('vShotA').innerText = sA; document.getElementById('vShotB').innerText = sB;
            document.getElementById('bShotA').style.width = (sA/sT*100)+"%"; document.getElementById('bShotB').style.width = (sB/sT*100)+"%";
        }

        function simular(m) {
            const b = document.getElementById('matchStatus');
            if(m === 'danger') { b.innerText = "⚠️ ATAQUE PERIGOSO"; b.className = "match-status-banner status-danger"; }
            else { b.innerText = "BOLA EM JOGO"; b.className = "match-status-banner"; }
        }

        window.highlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.add('highlight');
        window.unhighlight = (id) => document.querySelector(`.player-dot[data-id="${id}"]`)?.classList.remove('highlight');
    </script>
</body>
</html>
